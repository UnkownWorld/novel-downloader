            }
            
            testAborted = 'testing';
            const testStatus = document.getElementById('testStatus');
            testStatus.classList.remove('hidden');
            testStatus.innerHTML = `
                <div style="margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
                    <span>正在测试书源...</span>
                    <button class="btn btn-danger btn-small" onclick="stopTest()">停止测试</button>
                </div>
                <div style="font-size:0.8rem;color:rgba(255,255,255,0.6)">使用后端API测试，更准确</div>
            `;
            
            const enabledSources = bookSources.filter(s => s.enabled !== false);
            const total = enabledSources.length;
            let valid = 0;
            let invalid = 0;
            const invalidList = [];
            const testResults = [];
            
            // 每批测试20个（后端限制）
            const batchSize = 20;
            
            for (let i = 0; i < enabledSources.length; i += batchSize) {
                if (testAborted === 'stop') break;
                
                const batch = enabledSources.slice(i, i + batchSize);
                const urls = batch.map(s => ({ url: s.bookSourceUrl, name: s.bookSourceName }));
                
                try {
                    // 调用后端API测试
                    const response = await fetch('/api/test-sources', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ urls })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        // 处理结果
                        for (const result of data.results) {
                            const source = batch.find(s => s.bookSourceUrl === result.url);
                            if (source) {
                                testResults.push({
                                    source,
                                    homepageOk: result.success,
                                    responseTime: result.responseTime,
                                    error: result.error
                                });
                                
                                if (result.success) {
                                    valid++;
                                } else {
                                    invalid++;
                                    invalidList.push({
                                        name: result.name,
                                        url: result.url,
                                        error: result.error
                                    });
                                }
                            }
                        }
                    }
                } catch (e) {
                    // API调用失败，标记这批为未知
                    for (const source of batch) {
                        invalid++;
                        invalidList.push({
                            name: source.bookSourceName,
                            url: source.bookSourceUrl,
                            error: '测试失败'
                        });
                    }
                }
                
                // 更新进度
                const progress = Math.min(i + batchSize, total);
                testStatus.innerHTML = `
                    <div style="margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
                        <span>测试进度: ${progress}/${total}</span>
                        <button class="btn btn-danger btn-small" onclick="stopTest()">停止测试</button>
                    </div>
                    <div style="color:#00b894">✓ 有效: ${valid}</div>
                    <div style="color:#e94560">✗ 失效: ${invalid}</div>
                `;
            }
            
            // 显示最终结果
            const invalidNames = invalidList.map(i => i.name);
            testStatus.innerHTML = `
                <div style="margin-bottom:8px;font-weight:bold">
                    ${testAborted === 'stop' ? '测试已中断' : '测试完成'}
                </div>
                <div style="color:#00b894">✓ 有效书源: ${valid}</div>
                <div style="color:#e94560">✗ 失效书源: ${invalid}</div>
                ${invalid > 0 ? `
                    <div style="margin-top:8px;font-size:0.75rem;color:rgba(255,255,255,0.6);max-height:100px;overflow-y:auto">
                        失效书源:<br>
                        ${invalidList.slice(0, 10).map(i => `• ${i.name}: ${i.error}`).join('<br>')}
                        ${invalid > 10 ? `<br>...还有 ${invalid - 10} 个` : ''}
                    </div>
                ` : ''}
                ${invalid > 0 ? `<button class="btn btn-danger btn-small" style="margin-top:8px" onclick="removeInvalidSources()">删除 ${invalid} 个失效书源</button>` : ''}
            `;
            
            window.invalidSources = invalidNames;
            window.testResults = testResults;
            
            if (testAborted === 'stop') {
                showToast(`测试已中断: ${valid} 个有效, ${invalid} 个失效`);
            } else {
                showToast(`测试完成: ${valid} 个有效, ${invalid} 个失效`);
            }
            
            testAborted = false;
        }
        
        // 停止测试
        function stopTest() {
            testAborted = 'stop';
            showToast('正在停止测试...');
            document.getElementById('testStatus').innerHTML = `
                <div style="margin-bottom:8px">正在停止测试...</div>
            `;
        }
        
        
        // 删除失效书源
        function removeInvalidSources() {
            if (!window.invalidSources || window.invalidSources.length === 0) {
                // 如果没有测试过，先提示测试
                showToast('请先测试书源', true);
                return;
            }
            
            const invalidCount = window.invalidSources.length;
            if (!confirm(`确定要删除 ${invalidCount} 个失效书源吗？`)) {
                return;
            }
            
            // 过滤掉失效的书源
            bookSources = bookSources.filter(s => !window.invalidSources.includes(s.bookSourceName));
            
            Storage.set('bookSources', bookSources);
            updateSourceCount();
            updateSourceSelect();
            renderSourceList();
            
            // 清空测试状态
            document.getElementById('testStatus').classList.add('hidden');
            window.invalidSources = [];
            
            showToast(`已删除 ${invalidCount} 个失效书源`);
        }
        
        // ========== 搜索 ==========
        
        let searchAborted = false;
        let foundResults = [];
        
        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (searchAborted === 'searching') return; // 防止重复搜索
            
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) {
                showToast('请输入搜索关键词', true);
                return;
            }
            
            // 检查书源
            if (!bookSources || bookSources.length === 0) {
                showToast('请先导入书源', true);
                return;
            }
            
            const enabledSources = bookSources.filter(s => s.enabled !== false && s.searchUrl);
            if (!enabledSources.length) { 
                showToast('没有可用的书源（书源未启用或缺少搜索地址）', true); 
                return; 
            }
            
            // 初始化搜索状态
            searchAborted = 'searching';
            foundResults = [];
            searchResults = [];
            
            const btn = document.getElementById('searchBtn');
            const stopBtn = document.getElementById('stopSearchBtn');
            btn.disabled = true;
            btn.textContent = '搜索中...';
            stopBtn.classList.remove('hidden');
            
            // 显示搜索状态区域
            const resultsCard = document.getElementById('resultsCard');
            resultsCard.classList.remove('hidden');
            document.getElementById('bookList').innerHTML = '<div class="loading">正在初始化搜索...</div>';
            
            const sourceIdx = document.getElementById('sourceSelect').value;
            const sourcesToSearch = sourceIdx !== '' ? [enabledSources[parseInt(sourceIdx)]] : enabledSources;
            const searchMode = document.getElementById('searchMode').value;
            
            const statusDiv = document.getElementById('searchStatus');
            statusDiv.classList.remove('hidden');
            statusDiv.innerHTML = `
                <div style="margin-bottom:8px;color:rgba(255,255,255,0.7)">
                    <span id="searchProgress">正在搜索 0/${sourcesToSearch.length} 个书源...</span>
                    <span id="foundCount" style="color:#00b894;margin-left:10px">已找到: 0</span>
                </div>
                <div id="sourceStatusList"></div>
            `;
            
            const startTime = Date.now();
            let completedCount = 0;
            
            // 实时显示结果的函数
            const updateResults = () => {
                if (foundResults.length > 0) {
                    // 去重
                    const seen = new Set();
                    const uniqueResults = foundResults.filter(book => {
                        const key = `${book.name}-${book.author}`;
                        if (seen.has(key)) return false;
                        seen.add(key);
                        return true;
                    });
                    
                    // 实时显示结果
                    const bookList = document.getElementById('bookList');
                    bookList.innerHTML = uniqueResults.slice(0, 50).map((book, i) => `
                        <div class="book-item" onclick="selectBook(${i})">
                            <h3>《${book.name}》</h3>
                            <div class="meta">${book.author ? '作者: ' + book.author + ' | ' : ''}来源: ${book.sourceName}</div>
                            ${book.intro ? `<div class="intro">${book.intro}</div>` : ''}
                        </div>
                    `).join('');
                    
                    document.getElementById('foundCount').textContent = `已找到: ${uniqueResults.length}`;
                    searchResults = uniqueResults;
                }
            };
            
            try {
                // 使用逐个搜索，支持实时显示和提前停止
                const searchPromises = [];
                
                for (let i = 0; i < sourcesToSearch.length; i++) {
                    if (searchAborted === 'stop') {
                        break;
                    }
                    
                    const source = sourcesToSearch[i];
                    const statusId = `status-${source.bookSourceName.replace(/[^a-zA-Z0-9]/g, '_')}`;
                    
                    // 更新状态列表（只显示最近的10个）
                    const statusList = document.getElementById('sourceStatusList');
                    const existingStatus = document.getElementById(statusId);
                    if (!existingStatus) {
                        const statusHtml = `<div class="source-status loading" id="${statusId}">${source.bookSourceName}: 搜索中...</div>`;
                        statusList.innerHTML = statusHtml + statusList.innerHTML;
                        // 保持最多15个状态显示
                        const statuses = statusList.querySelectorAll('.source-status');
                        if (statuses.length > 15) {
                            statuses[statuses.length - 1].remove();
                        }
                    }
                    
                    // 异步搜索每个书源
                    const promise = searchSource(source, keyword).then(results => {
                        completedCount++;
                        document.getElementById('searchProgress').textContent = 
                            `正在搜索 ${completedCount}/${sourcesToSearch.length} 个书源...`;
                        
                        if (results && results.length > 0) {
                            foundResults.push(...results);
                            updateResults();
                            
                            // 快速模式：找到结果后可以提前结束
                            if (searchMode === 'fast' && foundResults.length >= 3) {
                                // 找到足够结果，标记为可以停止
                                return results;
                            }
                        }
                        return results;
                    });
                    
                    searchPromises.push(promise);
                    
                    // 快速模式：并发搜索前5个，找到结果就停止后续
                    if (searchMode === 'fast') {
                        // 每批并发5个
                        if ((i + 1) % 5 === 0 || i === sourcesToSearch.length - 1) {
                            await Promise.all(searchPromises.slice(-5));
                            if (foundResults.length >= 3 && searchAborted !== 'stop') {
                                // 找到足够结果，等待当前批次完成后停止
                                break;
                            }
                        }
                    }
                }
                
                // 等待所有搜索完成（完整模式）
                if (searchMode === 'full' && searchAborted !== 'stop') {
                    await Promise.all(searchPromises);
                }
                
            } catch (err) {
                console.error('搜索出错:', err);
            }
            
            // 搜索完成
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
            
            if (searchAborted === 'stop') {
                document.getElementById('searchProgress').textContent = 
                    `已停止搜索 (耗时 ${elapsed}秒)`;
            } else {
                document.getElementById('searchProgress').textContent = 
                    `搜索完成 (耗时 ${elapsed}秒)`;
            }
            
            if (searchResults.length > 0) {
                showToast(`找到 ${searchResults.length} 个结果`);
            } else {
                document.getElementById('bookList').innerHTML = 
                    '<div class="loading">未找到相关结果，请尝试其他关键词或切换搜索模式</div>';
                showToast('未找到结果', true);
            }
            
            btn.disabled = false;
            btn.textContent = '搜索';
            stopBtn.classList.add('hidden');
            searchAborted = false;
        });
        
        // 停止搜索
        document.getElementById('stopSearchBtn').addEventListener('click', () => {
            searchAborted = 'stop';
            document.getElementById('searchProgress').textContent = '正在停止搜索...';
            showToast('正在停止搜索...');
        });
        
        async function searchSource(source, keyword) {
            const statusId = `status-${source.bookSourceName.replace(/[^a-zA-Z0-9]/g, '_')}`;
            const statusEl = document.getElementById(statusId);
            
            try {
                statusEl.className = 'source-status loading';
                statusEl.textContent = `${source.bookSourceName}: 搜索中...`;
                
                const searchUrl = (source.searchUrl || '').replace('{{key}}', encodeURIComponent(keyword)).replace('{{page}}', '1');
                const fullUrl = searchUrl.startsWith('http') ? searchUrl : source.bookSourceUrl + searchUrl;
                
                const result = await fetchHtml(fullUrl);
                
                if (!result.success) {
                    statusEl.className = 'source-status error';
                    statusEl.textContent = `${source.bookSourceName}: 请求失败`;
                    return [];
                }
                
                const rule = source.ruleSearch || {};
                const parser = new AnalyzeRule().setContent(result.content, result.url);
                const items = parser.getElements(rule.bookList);
                
                const books = items.map(item => {
                    const r = new AnalyzeRule().setContent(item, result.url);
                    const name = r.getString(rule.name);
                    if (!name) return null;
                    
                    let bookUrl = r.getString(rule.bookUrl);
                    if (bookUrl && !bookUrl.startsWith('http')) {
                        bookUrl = resolveUrl(source.bookSourceUrl, bookUrl);
                    }
                    
                    return {
                        name,
                        author: r.getString(rule.author),
                        bookUrl,
                        intro: r.getString(rule.intro),
                        kind: r.getString(rule.kind),
                        lastChapter: r.getString(rule.lastChapter),
                        sourceName: source.bookSourceName,
                        sourceUrl: source.bookSourceUrl,
                        source
                    };
                }).filter(b => b && b.name && b.bookUrl);
                
                statusEl.className = 'source-status success';
                statusEl.textContent = `${source.bookSourceName}: ${books.length}个${result.fromCache ? '(缓存)' : ''}`;
                return books;
            } catch (err) {
                statusEl.className = 'source-status error';
                statusEl.textContent = `${source.bookSourceName}: ${err.message}`;
                return [];
            }
        }
        
        function resolveUrl(base, relative) {
            if (!relative) return '';
            if (relative.startsWith('http')) return relative;
            if (relative.startsWith('//')) return 'https:' + relative;
            if (relative.startsWith('/')) {
                try { return new URL(base).origin + relative; } catch (e) { return relative; }
            }
            try { return new URL(relative, base).href; } catch (e) { return relative; }
        }
        
        function displayResults(results) {
            const list = document.getElementById('bookList');
            document.getElementById('resultCount').textContent = `(${results.length})`;
            list.innerHTML = results.map((book, i) => `
                <div class="book-item" onclick="selectBook(${i})">
                    <h3>《${book.name}》</h3>
                    <div class="meta">${book.author ? '作者: ' + book.author + ' | ' : ''}来源: ${book.sourceName}</div>
                    ${book.intro ? `<div class="intro">${book.intro}</div>` : ''}
                </div>
            `).join('');
            document.getElementById('resultsCard').classList.remove('hidden');
            document.getElementById('bookInfoCard').classList.add('hidden');
            document.getElementById('downloadCard').classList.add('hidden');
        }
        
        async function selectBook(index) {
            document.querySelectorAll('.book-item').forEach((item, i) => item.classList.toggle('selected', i === index));
            selectedBook = searchResults[index];
            selectedSource = selectedBook.source;
            
            document.getElementById('bookInfo').innerHTML = `
                <h3>《${selectedBook.name}》</h3>
                <p style="color:rgba(255,255,255,0.6);margin-top:4px">${selectedBook.author ? '作者: ' + selectedBook.author : ''}</p>
                <div class="loading" id="bookLoading">正在获取书籍信息...</div>
            `;
            document.getElementById('bookInfoCard').classList.remove('hidden');
            document.getElementById('chapterListSection').classList.add('hidden');
            document.getElementById('downloadActions').classList.add('hidden');
            
            try {
                const bookResult = await fetchHtml(selectedBook.bookUrl);
                
                if (bookResult.success && selectedSource.ruleBookInfo) {
                    const infoRules = selectedSource.ruleBookInfo;
                    const parser = new AnalyzeRule().setContent(bookResult.content, bookResult.url);
                    if (!selectedBook.author) selectedBook.author = parser.getString(infoRules.author);
                    selectedBook.intro = parser.getString(infoRules.intro) || selectedBook.intro;
                    let tocUrl = parser.getString(infoRules.tocUrl);
                    if (tocUrl && !tocUrl.startsWith('http')) tocUrl = resolveUrl(selectedSource.bookSourceUrl, tocUrl);
                    selectedBook.tocUrl = tocUrl || selectedBook.bookUrl;
                } else {
                    selectedBook.tocUrl = selectedBook.bookUrl;
                }
                
                chapters = [];
                if (selectedSource.ruleToc) {
                    const tocResult = await fetchHtml(selectedBook.tocUrl);
                    if (tocResult.success) {
                        const tocRules = selectedSource.ruleToc;
                        const parser = new AnalyzeRule().setContent(tocResult.content, tocResult.url);
                        const items = parser.getElements(tocRules.chapterList);
                        chapters = items.map((item, idx) => {
                            const r = new AnalyzeRule().setContent(item, tocResult.url);
                            let chapterUrl = r.getString(tocRules.chapterUrl);
                            if (chapterUrl && !chapterUrl.startsWith('http')) chapterUrl = resolveUrl(selectedBook.tocUrl, chapterUrl);
                            return { name: r.getString(tocRules.chapterName), url: chapterUrl, selected: false };
                        }).filter(ch => ch.name && ch.url);
                    }
                }
                
                document.getElementById('bookLoading').classList.add('hidden');
                document.getElementById('bookInfo').innerHTML = `
                    <h3>《${selectedBook.name}》</h3>
                    <p style="color:rgba(255,255,255,0.6);margin-top:4px">${selectedBook.author ? '作者: ' + selectedBook.author : ''}</p>
                    ${selectedBook.intro ? `<p style="color:rgba(255,255,255,0.5);margin-top:8px;font-size:0.85rem">${selectedBook.intro.substring(0, 200)}...</p>` : ''}
                `;
                
                if (chapters.length > 0) {
                    document.getElementById('chapterCount').textContent = `(${chapters.length})`;
                    document.getElementById('chapterList').innerHTML = chapters.map((ch, i) => `
                        <div class="chapter-item" onclick="toggleChapter(${i})">
                            <input type="checkbox" id="ch${i}" ${ch.selected ? 'checked' : ''}>
                            <label for="ch${i}">${ch.name}</label>
                        </div>
                    `).join('');
                    document.getElementById('chapterListSection').classList.remove('hidden');
                    document.getElementById('downloadActions').classList.remove('hidden');
                } else {
                    showToast('未找到章节列表', true);
                }
            } catch (err) {
                document.getElementById('bookLoading').textContent = '获取失败: ' + err.message;
                showToast('获取书籍信息失败', true);
            }
        }
        
        function toggleChapter(index) {
            chapters[index].selected = !chapters[index].selected;
            document.getElementById('ch' + index).checked = chapters[index].selected;
        }
        
        function selectAllChapters() {
            chapters.forEach((ch, i) => { ch.selected = true; document.getElementById('ch' + i).checked = true; });
        }
        
        function deselectAllChapters() {
            chapters.forEach((ch, i) => { ch.selected = false; document.getElementById('ch' + i).checked = false; });
        }
        
        // ========== 下载 ==========
        
        async function downloadSelected() {
            const selected = chapters.filter(ch => ch.selected);
            if (!selected.length) { showToast('请先选择章节', true); return; }
            await downloadChapters(selected);
        }
        
        async function downloadAll() {
            await downloadChapters(chapters.slice(0, 300));
        }
        
        async function downloadChapters(chaptersToDownload) {
            document.getElementById('downloadCard').classList.remove('hidden');
            document.getElementById('downloadProgressFill').style.width = '0%';
            document.getElementById('downloadProgressText').textContent = '准备下载...';
            document.getElementById('saveActions').classList.add('hidden');
            document.getElementById('downloadLog').innerHTML = '';
            downloadedContent = '';
            
            const contentRule = selectedSource.ruleContent?.content || '#content';
            downloadedContent = `书名: ${selectedBook.name}\n作者: ${selectedBook.author || '未知'}\n来源: ${selectedBook.sourceName}\n下载时间: ${new Date().toLocaleString()}\n\n${'='.repeat(50)}\n\n`;
            
            let success = 0, fail = 0;
            const logPanel = document.getElementById('downloadLog');
            
            for (let i = 0; i < chaptersToDownload.length; i++) {
                const ch = chaptersToDownload[i];
                
                try {
                    document.getElementById('downloadProgressText').textContent = `下载中: ${ch.name} (${i + 1}/${chaptersToDownload.length})`;
                    
                    const result = await fetchHtml(ch.url);
                    
                    if (result.success) {
                        const parser = new AnalyzeRule().setContent(result.content, result.url);
                        let content = parser.getString(contentRule);
                        
                        if (content) {
                            content = content.replace(/&nbsp;/g, ' ').replace(/<br\s*\/?>/gi, '\n').replace(/<[^>]+>/g, '').trim();
                            downloadedContent += `第${i + 1}章 ${ch.name}\n\n${content}\n\n`;
                            success++;
                            logPanel.innerHTML += `<div class="log-item log-success">✓ ${ch.name}${result.fromCache ? '(缓存)' : ''}</div>`;
                        } else {
                            fail++;
                            logPanel.innerHTML += `<div class="log-item log-error">✗ ${ch.name}: 内容为空</div>`;
                        }
                    } else {
                        fail++;
                        logPanel.innerHTML += `<div class="log-item log-error">✗ ${ch.name}: 请求失败</div>`;
                    }
                } catch (e) {
                    fail++;
                    logPanel.innerHTML += `<div class="log-item log-error">✗ ${ch.name}: ${e.message}</div>`;
                }
                
                document.getElementById('downloadProgressFill').style.width = Math.round((i + 1) / chaptersToDownload.length * 100) + '%';
                logPanel.scrollTop = logPanel.scrollHeight;
                
                await new Promise(r => setTimeout(r, 200));
            }
            
            document.getElementById('downloadProgressText').textContent = `下载完成！成功: ${success}, 失败: ${fail}`;
            document.getElementById('saveActions').classList.remove('hidden');
            
            saveToHistory();
            showToast('下载完成！');
        }
        
        function saveToFile() {
            if (!downloadedContent) return showToast('没有内容', true);
            const blob = new Blob([downloadedContent], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${selectedBook.name}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('文件已保存！');
        }
        
        async function copyToClipboard() {
            if (!downloadedContent) return showToast('没有内容', true);
            try {
                await navigator.clipboard.writeText(downloadedContent.substring(0, 500000));
                showToast('已复制！');
            } catch (e) {
                showToast('复制失败', true);
            }
        }
        
        // ========== 历史 ==========
        
        function saveToHistory() {
            const item = {
                id: Date.now(),
                name: selectedBook.name,
                author: selectedBook.author,
                source: selectedBook.sourceName,
                content: downloadedContent.substring(0, 100000),
                date: new Date().toLocaleString(),
                size: (downloadedContent.length / 1024).toFixed(1) + ' KB'
            };
            downloadHistory.unshift(item);
            if (downloadHistory.length > 10) downloadHistory = downloadHistory.slice(0, 10);
            Storage.set('downloadHistory', downloadHistory);
        }
        
        function renderHistory() {
            const list = document.getElementById('historyList');
            if (!downloadHistory.length) {
                list.innerHTML = '<p class="loading">暂无记录</p>';
                return;
            }
            list.innerHTML = downloadHistory.map(item => `
                <div class="history-item">
                    <div class="history-info">
                        <h4>《${item.name}》</h4>
                        <p>${item.author || ''} | ${item.size} | ${item.date}</p>
                    </div>
                    <button class="btn btn-small" onclick="downloadHistoryItem(${item.id})">保存</button>
                </div>
            `).join('');
        }
        
        function downloadHistoryItem(id) {
            const item = downloadHistory.find(h => h.id === id);
            if (item) {
                const blob = new Blob([item.content], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${item.name}.txt`;
                a.click();
                URL.revokeObjectURL(url);
            }
        }
        
        function clearHistory() {
            downloadHistory = [];
            Storage.set('downloadHistory', []);
            renderHistory();
            showToast('已清空');
        }
        
        // ========== 订阅管理 ==========
        
        // 渲染订阅列表
        function renderSubscribeList() {
            const list = document.getElementById('subscribeList');
            if (!subscribeList || subscribeList.length === 0) {
                list.innerHTML = '<p class="loading">暂无订阅</p>';
                return;
            }
            
            list.innerHTML = subscribeList.map((sub, i) => `
                <div class="source-item">
                    <div style="flex:1">
                        <div class="name">${sub.name || '未命名合集'}</div>
                        <div class="url">${sub.url}</div>
                        <div style="font-size:0.7rem;color:rgba(255,255,255,0.4);margin-top:2px">
                            ${sub.sourceCount || '?'} 个书源 | 
                            更新: ${sub.lastUpdate ? new Date(sub.lastUpdate).toLocaleDateString() : '未更新'}
                        </div>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-small" onclick="refreshSubscribe(${i})">🔄</button>
                        <button class="btn btn-danger btn-small" onclick="removeSubscribe(${i})">✕</button>
                    </div>
                </div>
            `).join('');
        }
        
        // 添加订阅
        async function addSubscribe() {
            const input = document.getElementById('subscribeUrlInput');
            const url = input.value.trim();
            
            if (!url) {
                showToast('请输入订阅URL', true);
                return;
            }
            
            // 检查是否已订阅
            if (subscribeList.some(s => s.url === url)) {
                showToast('该URL已订阅', true);
                return;
            }
            
            showToast('正在获取订阅...');
            
            try {
                const result = await fetchHtml(url);
                if (!result.success) {
                    showToast('获取订阅失败', true);
                    return;
                }
                
                const data = JSON.parse(result.content);
                const sources = extractBookSources(data);
                
                if (sources.length === 0) {
                    showToast('未找到有效书源', true);
                    return;
                }
                
                // 添加到订阅列表
                const subscribe = {
                    url: url,
                    name: `书源合集 (${sources.length}个)`,
                    sourceCount: sources.length,
                    lastUpdate: Date.now(),
                    sources: sources
                };
                
                subscribeList.push(subscribe);
                Storage.set('subscribeList', subscribeList);
                
                // 导入书源
                let added = 0, updated = 0;
                sources.forEach(s => {
                    if (!s.bookSourceName || !s.bookSourceUrl) return;
                    const existingIndex = bookSources.findIndex(existing => existing.bookSourceUrl === s.bookSourceUrl);
                    if (existingIndex >= 0) {
                        bookSources[existingIndex] = { ...bookSources[existingIndex], ...s, enabled: s.enabled !== false };
                        updated++;
                    } else {
                        bookSources.push({ ...s, enabled: s.enabled !== false });
                        added++;
                    }
                });
                
                Storage.set('bookSources', bookSources);
                updateSourceCount();
                updateSourceSelect();
                renderSourceList();
                renderSubscribeList();
                
                input.value = '';
                showToast(`订阅成功！新增 ${added} 个，更新 ${updated} 个书源`);
                
            } catch (e) {
                showToast('订阅失败: ' + e.message, true);
            }
        }
        
        // 快速订阅（从推荐列表）
        async function quickSubscribe(url) {
            document.getElementById('subscribeUrlInput').value = url;
            await addSubscribe();
        }
        
        // 刷新单个订阅
        async function refreshSubscribe(index) {
            const sub = subscribeList[index];
            if (!sub) return;
            
            showToast('正在刷新订阅...');
            
            try {
                const result = await fetchHtml(sub.url);
                if (!result.success) {
                    showToast('刷新失败', true);
                    return;
                }
                
                const data = JSON.parse(result.content);
                const sources = extractBookSources(data);
                
                if (sources.length === 0) {
                    showToast('未找到有效书源', true);
                    return;
                }
                
                // 更新订阅信息
                subscribeList[index].sourceCount = sources.length;
                subscribeList[index].lastUpdate = Date.now();
                subscribeList[index].sources = sources;
                Storage.set('subscribeList', subscribeList);
                
                // 更新书源
                let added = 0, updated = 0;
                sources.forEach(s => {
                    if (!s.bookSourceName || !s.bookSourceUrl) return;
                    const existingIndex = bookSources.findIndex(existing => existing.bookSourceUrl === s.bookSourceUrl);
                    if (existingIndex >= 0) {
                        bookSources[existingIndex] = { ...bookSources[existingIndex], ...s, enabled: s.enabled !== false };
                        updated++;
                    } else {
                        bookSources.push({ ...s, enabled: s.enabled !== false });
                        added++;
                    }
                });
                
                Storage.set('bookSources', bookSources);
                updateSourceCount();
                updateSourceSelect();
                renderSourceList();
                renderSubscribeList();
                
                showToast(`刷新成功！新增 ${added} 个，更新 ${updated} 个书源`);
                
            } catch (e) {
                showToast('刷新失败: ' + e.message, true);
            }
        }
        
        // 刷新所有订阅
        async function refreshAllSubscribes() {
            if (!subscribeList || subscribeList.length === 0) {
                showToast('暂无订阅', true);
                return;
            }
            
            const statusDiv = document.getElementById('subscribeStatus');
            statusDiv.classList.remove('hidden');
            statusDiv.innerHTML = '<div class="loading">正在刷新所有订阅...</div>';
            
            let totalAdded = 0, totalUpdated = 0;
            
            for (let i = 0; i < subscribeList.length; i++) {
                const sub = subscribeList[i];
                statusDiv.innerHTML = `<div class="loading">正在刷新 ${i + 1}/${subscribeList.length}...</div>`;
                
                try {
                    const result = await fetchHtml(sub.url);
                    if (result.success) {
                        const data = JSON.parse(result.content);
                        const sources = extractBookSources(data);
                        
                        subscribeList[i].sourceCount = sources.length;
                        subscribeList[i].lastUpdate = Date.now();
                        subscribeList[i].sources = sources;
                        
                        sources.forEach(s => {
                            if (!s.bookSourceName || !s.bookSourceUrl) return;
                            const existingIndex = bookSources.findIndex(existing => existing.bookSourceUrl === s.bookSourceUrl);
                            if (existingIndex >= 0) {
                                bookSources[existingIndex] = { ...bookSources[existingIndex], ...s, enabled: s.enabled !== false };
                                totalUpdated++;
                            } else {
                                bookSources.push({ ...s, enabled: s.enabled !== false });
                                totalAdded++;
                            }
                        });
                    }
                } catch (e) {
                    console.error('刷新订阅失败:', sub.url, e);
                }
            }
            
            Storage.set('subscribeList', subscribeList);
            Storage.set('bookSources', bookSources);
            updateSourceCount();
            updateSourceSelect();
            renderSourceList();
            renderSubscribeList();
            
            statusDiv.classList.add('hidden');
            showToast(`全部刷新完成！新增 ${totalAdded} 个，更新 ${totalUpdated} 个书源`);
        }
        
        // 删除订阅
        function removeSubscribe(index) {
            if (confirm('确定取消此订阅？')) {
                subscribeList.splice(index, 1);
                Storage.set('subscribeList', subscribeList);
                renderSubscribeList();
                showToast('已取消订阅');
            }
        }
        
        // 显示添加订阅弹窗（预留）
        function showAddSubscribeModal() {
            showToast('请直接在上方输入框粘贴订阅URL');
        }
        
        // 启动
        init();
    </script>
</body>
</html>
