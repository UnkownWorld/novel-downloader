<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说下载器 - Legado完整版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 15px;
            color: #fff;
            font-size: 14px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { 
            font-size: 1.6rem; 
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { font-size: 0.8rem; opacity: 0.7; margin-top: 5px; }
        
        .card { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; 
            padding: 15px; 
            margin-bottom: 12px;
        }
        
        .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .form-row input { flex: 1; min-width: 150px; }
        
        input, select, textarea {
            padding: 10px 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.4); }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #e94560; }
        select option { background: #1a1a2e; }
        
        .btn { 
            padding: 10px 18px; 
            background: linear-gradient(90deg, #e94560, #ff6b6b); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 0.9rem; 
            cursor: pointer; 
            white-space: nowrap;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-success { background: linear-gradient(90deg, #00b894, #00cec9); }
        .btn-secondary { background: rgba(255,255,255,0.15); }
        .btn-danger { background: linear-gradient(90deg, #d63031, #e17055); }
        .btn-small { padding: 6px 12px; font-size: 0.8rem; }
        
        .book-item { 
            padding: 12px; 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px; 
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .book-item:hover { border-color: #e94560; background: rgba(233, 69, 96, 0.1); }
        .book-item.selected { border-color: #e94560; background: rgba(233, 69, 96, 0.2); }
        .book-item h3 { font-size: 0.95rem; margin-bottom: 4px; }
        .book-item .meta { color: rgba(255,255,255,0.6); font-size: 0.8rem; }
        .book-item .intro { color: rgba(255,255,255,0.5); font-size: 0.75rem; margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .progress { margin-top: 12px; }
        .progress-bar { height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #e94560, #ff6b6b); transition: width 0.3s; }
        .progress-text { text-align: center; color: rgba(255,255,255,0.8); font-size: 0.85rem; }
        
        .hidden { display: none !important; }
        
        .toast {
            position: fixed;
            bottom: 15px;
            right: 15px;
            padding: 10px 18px;
            background: rgba(0, 184, 148, 0.9);
            color: white;
            border-radius: 6px;
            transform: translateX(200%);
            transition: transform 0.3s;
            z-index: 1000;
            max-width: 300px;
            font-size: 0.85rem;
        }
        .toast.show { transform: translateX(0); }
        .toast.error { background: rgba(214, 48, 49, 0.9); }
        
        .tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
        .tab { 
            padding: 6px 14px; 
            background: rgba(255,255,255,0.1); 
            color: white; 
            border: none;
            border-radius: 15px; 
            cursor: pointer; 
            font-size: 0.85rem;
        }
        .tab.active { background: linear-gradient(90deg, #e94560, #ff6b6b); }
        
        .source-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 5px;
            margin-bottom: 5px;
            background: rgba(255,255,255,0.02);
            font-size: 0.85rem;
        }
        .source-item .name { font-weight: 500; }
        .source-item .url { font-size: 0.7rem; color: rgba(255,255,255,0.4); }
        .source-item.disabled { opacity: 0.5; }
        
        textarea {
            width: 100%;
            height: 100px;
            resize: vertical;
            font-family: monospace;
        }
        
        .stats { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
        .stat { text-align: center; padding: 8px 12px; background: rgba(233, 69, 96, 0.1); border-radius: 6px; border: 1px solid rgba(233, 69, 96, 0.2); }
        .stat .num { font-size: 1.3rem; font-weight: bold; color: #e94560; }
        .stat .label { font-size: 0.7rem; color: rgba(255,255,255,0.6); }
        
        .source-list { max-height: 300px; overflow-y: auto; margin-bottom: 10px; }
        
        .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
        
        .file-input-wrapper { position: relative; display: inline-block; }
        .file-input-wrapper input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        
        .history-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; margin-bottom: 6px;
        }
        .history-info h4 { font-size: 0.9rem; }
        .history-info p { font-size: 0.75rem; color: rgba(255,255,255,0.5); }
        
        .chapter-list { max-height: 350px; overflow-y: auto; }
        .chapter-item { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; }
        .chapter-item:hover { background: rgba(255,255,255,0.05); }
        .chapter-item input { width: 16px; height: 16px; }
        
        .loading { text-align: center; padding: 20px; color: rgba(255,255,255,0.5); }
        
        .log-panel {
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.75rem;
            margin-top: 10px;
        }
        .log-panel .log-item { margin-bottom: 2px; color: rgba(255,255,255,0.7); }
        .log-panel .log-error { color: #e94560; }
        .log-panel .log-success { color: #00b894; }
        
        .search-status {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .source-status {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            background: rgba(255,255,255,0.1);
        }
        .source-status.success { background: rgba(0, 184, 148, 0.3); }
        .source-status.error { background: rgba(214, 48, 49, 0.3); }
        .source-status.loading { background: rgba(255, 193, 7, 0.3); }
        
        .import-status {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
            font-size: 0.85rem;
        }
        
        .storage-info {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0, 184, 148, 0.1);
            border-radius: 6px;
            font-size: 0.8rem;
            border: 1px solid rgba(0, 184, 148, 0.2);
        }
        
        .storage-info h4 { color: #00b894; margin-bottom: 5px; }
        
        .settings-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .settings-row label {
            min-width: 120px;
            font-size: 0.85rem;
        }
        
        .settings-row input[type="number"] { width: 80px; }
        .settings-row input[type="checkbox"] { width: 18px; height: 18px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 小说下载器</h1>
            <p>Legado书源规则 | IndexedDB大容量存储</p>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('search')">🔍 搜索下载</button>
            <button class="tab" onclick="showTab('sources')">📚 书源管理</button>
            <button class="tab" onclick="showTab('settings')">⚙️ 设置</button>
            <button class="tab" onclick="showTab('history')">📁 历史</button>
        </div>
        
        <!-- 搜索页面 -->
        <div id="searchTab">
            <div class="card">
                <form class="form-row" id="searchForm">
                    <input type="text" id="searchInput" placeholder="输入小说名称..." required>
                    <select id="sourceSelect" style="min-width:120px">
                        <option value="">全部书源</option>
                    </select>
                    <button type="submit" class="btn" id="searchBtn">搜索</button>
                </form>
                <div class="search-status hidden" id="searchStatus"></div>
                <div class="storage-info" id="storageInfo"></div>
            </div>
            
            <div class="card hidden" id="resultsCard">
                <h3 style="margin-bottom:10px;font-size:0.95rem">搜索结果 <span id="resultCount" style="opacity:0.6"></span></h3>
                <div id="bookList"></div>
            </div>
            
            <div class="card hidden" id="bookInfoCard">
                <div id="bookInfo"></div>
                <div class="progress hidden" id="progressSection">
                    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
                    <div class="progress-text" id="progressText">准备中...</div>
                </div>
                <div id="chapterListSection" class="hidden" style="margin-top:12px">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                        <h4 style="font-size:0.9rem">章节列表 <span id="chapterCount" style="opacity:0.6"></span></h4>
                        <div class="btn-group">
                            <button class="btn btn-small btn-secondary" onclick="selectAllChapters()">全选</button>
                            <button class="btn btn-small btn-secondary" onclick="deselectAllChapters()">取消</button>
                        </div>
                    </div>
                    <div class="chapter-list" id="chapterList"></div>
                </div>
                <div class="btn-group hidden" id="downloadActions" style="margin-top:12px">
                    <button class="btn" onclick="downloadSelected()">📥 下载选中</button>
                    <button class="btn btn-success" onclick="downloadAll()">📥 下载全部</button>
                </div>
            </div>
            
            <div class="card hidden" id="downloadCard">
                <div class="progress">
                    <div class="progress-bar"><div class="progress-fill" id="downloadProgressFill" style="width:0%"></div></div>
                    <div class="progress-text" id="downloadProgressText">准备中...</div>
                </div>
                <div class="log-panel" id="downloadLog"></div>
                <div class="btn-group hidden" id="saveActions" style="margin-top:12px">
                    <button class="btn btn-success" onclick="saveToFile()">💾 保存到本地</button>
                    <button class="btn" onclick="copyToClipboard()">📋 复制</button>
                </div>
            </div>
        </div>
        
        <!-- 书源管理页面 -->
        <div id="sourcesTab" class="hidden">
            <div class="card">
                <div class="stats">
                    <div class="stat">
                        <div class="num" id="sourceCount">0</div>
                        <div class="label">书源总数</div>
                    </div>
                    <div class="stat">
                        <div class="num" id="enabledCount">0</div>
                        <div class="label">已启用</div>
                    </div>
                </div>
                
                <h3 style="margin-bottom:8px;font-size:0.95rem">导入书源</h3>
                <textarea id="sourceInput" placeholder='粘贴Legado格式书源JSON，或输入书源URL...'></textarea>
                
                <div class="btn-group" style="margin-top:8px">
                    <button class="btn" onclick="importSources()">📥 导入JSON</button>
                    <button class="btn btn-secondary" onclick="importFromUrl()">🌐 从URL导入</button>
                    <div class="file-input-wrapper">
                        <button class="btn btn-secondary">📁 选择文件</button>
                        <input type="file" accept=".json,.txt" onchange="importFromFile(event)">
                    </div>
                </div>
                
                <div class="import-status hidden" id="importStatus"></div>
                
                <h3 style="margin:12px 0 8px;font-size:0.95rem">当前书源</h3>
                <div class="source-list" id="sourceList">
                    <p class="loading">加载中...</p>
                </div>
                
                <div class="btn-group">
                    <button class="btn btn-success btn-small" onclick="loadDefaultSources()">📦 默认书源</button>
                    <button class="btn btn-secondary btn-small" onclick="exportSources()">📤 导出</button>
                    <button class="btn btn-secondary btn-small" onclick="testAllSources()">🧪 测试全部</button>
                    <button class="btn btn-danger btn-small" onclick="clearInvalidSources()">🗑️ 删除无效</button>
                    <button class="btn btn-danger btn-small" onclick="clearSources()">🗑️ 清空</button>
                </div>
            </div>
        </div>
        
        <!-- 设置页面 -->
        <div id="settingsTab" class="hidden">
            <div class="card">
                <h3 style="margin-bottom:15px;font-size:0.95rem">⚙️ 存储设置</h3>
                
                <div class="storage-info" id="dbStorageInfo">
                    <h4>IndexedDB 存储</h4>
                    <p>使用浏览器内置数据库，容量更大（50MB-500MB）</p>
                </div>
                
                <div class="settings-row" style="margin-top:15px">
                    <label>并发请求数:</label>
                    <input type="number" id="concurrentLimit" value="3" min="1" max="10">
                    <span style="font-size:0.8rem;color:rgba(255,255,255,0.5)">同时搜索的书源数量</span>
                </div>
                
                <div class="settings-row">
                    <label>请求延迟(ms):</label>
                    <input type="number" id="requestDelay" value="300" min="100" max="2000">
                    <span style="font-size:0.8rem;color:rgba(255,255,255,0.5)">章节下载间隔</span>
                </div>
                
                <div class="settings-row">
                    <label>缓存有效期:</label>
                    <select id="cacheExpire">
                        <option value="3600000">1小时</option>
                        <option value="86400000" selected>1天</option>
                        <option value="604800000">1周</option>
                        <option value="0">永不过期</option>
                    </select>
                </div>
                
                <div class="settings-row">
                    <label><input type="checkbox" id="enableCache" checked> 启用缓存</label>
                </div>
                
                <div class="btn-group" style="margin-top:15px">
                    <button class="btn" onclick="saveSettings()">💾 保存设置</button>
                    <button class="btn btn-secondary" onclick="clearAllCache()">🗑️ 清除所有缓存</button>
                    <button class="btn btn-secondary" onclick="showStorageStats()">📊 存储统计</button>
                </div>
            </div>
            
            <div class="card">
                <h3 style="margin-bottom:10px;font-size:0.95rem">📊 请求统计</h3>
                <div class="stats">
                    <div class="stat">
                        <div class="num" id="totalRequests">0</div>
                        <div class="label">总请求数</div>
                    </div>
                    <div class="stat">
                        <div class="num" id="cacheHits">0</div>
                        <div class="label">缓存命中</div>
                    </div>
                    <div class="stat">
                        <div class="num" id="savedRequests">0</div>
                        <div class="label">节省请求</div>
                    </div>
                </div>
                <button class="btn btn-secondary btn-small" onclick="resetStats()">重置统计</button>
            </div>
        </div>
        
        <!-- 历史页面 -->
        <div id="historyTab" class="hidden">
            <div class="card">
                <h3 style="margin-bottom:10px;font-size:0.95rem">下载历史</h3>
                <div id="historyList"></div>
                <button class="btn btn-secondary btn-small" onclick="clearHistory()" style="margin-top:10px">清空历史</button>
            </div>
        </div>
        
        <div style="text-align:center;color:rgba(255,255,255,0.4);margin-top:12px;font-size:0.75rem">
            IndexedDB大容量存储 | 减少网络请求 | 书源来源于网络仅供学习
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        // ========== IndexedDB 数据库管理器 ==========
        class DBManager {
            constructor() {
                this.dbName = 'NovelDownloaderDB';
                this.dbVersion = 1;
                this.db = null;
                this.stores = {
                    cache: 'requestCache',
                    sources: 'bookSources',
                    history: 'downloadHistory',
                    settings: 'appSettings'
                };
            }
            
            // 初始化数据库
            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.dbVersion);
                    
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => {
                        this.db = request.result;
                        resolve(this.db);
                    };
                    
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        
                        // 创建缓存存储
                        if (!db.objectStoreNames.contains(this.stores.cache)) {
                            const cacheStore = db.createObjectStore(this.stores.cache, { keyPath: 'id' });
                            cacheStore.createIndex('url', 'url', { unique: false });
                            cacheStore.createIndex('timestamp', 'timestamp', { unique: false });
                        }
                        
                        // 创建书源存储
                        if (!db.objectStoreNames.contains(this.stores.sources)) {
                            const sourcesStore = db.createObjectStore(this.stores.sources, { keyPath: 'bookSourceUrl' });
                            sourcesStore.createIndex('name', 'bookSourceName', { unique: false });
                        }
                        
                        // 创建历史存储
                        if (!db.objectStoreNames.contains(this.stores.history)) {
                            const historyStore = db.createObjectStore(this.stores.history, { keyPath: 'id' });
                            historyStore.createIndex('date', 'date', { unique: false });
                        }
                        
                        // 创建设置存储
                        if (!db.objectStoreNames.contains(this.stores.settings)) {
                            db.createObjectStore(this.stores.settings, { keyPath: 'key' });
                        }
                    };
                });
            }
            
            // 通用存储方法
            async put(storeName, data) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, 'readwrite');
                    const store = transaction.objectStore(storeName);
                    const request = store.put(data);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }
            
            // 通用获取方法
            async get(storeName, key) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, 'readonly');
                    const store = transaction.objectStore(storeName);
                    const request = store.get(key);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }
            
            // 获取所有数据
            async getAll(storeName) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, 'readonly');
                    const store = transaction.objectStore(storeName);
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }
            
            // 删除数据
            async delete(storeName, key) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, 'readwrite');
                    const store = transaction.objectStore(storeName);
                    const request = store.delete(key);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }
            
            // 清空存储
            async clear(storeName) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, 'readwrite');
                    const store = transaction.objectStore(storeName);
                    const request = store.clear();
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }
            
            // 获取存储大小估算
            async getStorageEstimate() {
                if (navigator.storage && navigator.storage.estimate) {
                    const estimate = await navigator.storage.estimate();
                    return {
                        usage: (estimate.usage / 1024 / 1024).toFixed(2) + ' MB',
                        quota: (estimate.quota / 1024 / 1024).toFixed(2) + ' MB',
                        percent: ((estimate.usage / estimate.quota) * 100).toFixed(1) + '%'
                    };
                }
                return { usage: '未知', quota: '未知', percent: '未知' };
            }
            
            // 缓存相关方法
            async getCache(url) {
                const id = this.hashUrl(url);
                const cached = await this.get(this.stores.cache, id);
                
                if (!cached) return null;
                
                // 检查过期
                const settings = await this.getSettings();
                if (settings.cacheExpire > 0) {
                    const age = Date.now() - cached.timestamp;
                    if (age > settings.cacheExpire) {
                        await this.delete(this.stores.cache, id);
                        return null;
                    }
                }
                
                return cached.content;
            }
            
            async setCache(url, content) {
                const settings = await this.getSettings();
                if (!settings.enableCache) return;
                
                const id = this.hashUrl(url);
                await this.put(this.stores.cache, {
                    id,
                    url,
                    content,
                    timestamp: Date.now()
                });
            }
            
            // 书源相关方法
            async getSources() {
                return await this.getAll(this.stores.sources);
            }
            
            async setSource(source) {
                await this.put(this.stores.sources, source);
            }
            
            async setSources(sources) {
                for (const source of sources) {
                    await this.put(this.stores.sources, source);
                }
            }
            
            async deleteSource(url) {
                await this.delete(this.stores.sources, url);
            }
            
            async clearSources() {
                await this.clear(this.stores.sources);
            }
            
            // 历史相关方法
            async getHistory() {
                return await this.getAll(this.stores.history);
            }
            
            async addHistory(item) {
                await this.put(this.stores.history, item);
            }
            
            async clearHistory() {
                await this.clear(this.stores.history);
            }
            
            // 设置相关方法
            async getSettings() {
                const settings = await this.get(this.stores.settings, 'appSettings');
                return settings?.value || {
                    concurrentLimit: 3,

            }
            
            async add(requestFn) {
                return new Promise((resolve, reject) => {
                    this.queue.push({ requestFn, resolve, reject });
                    this.process();
                });
            }
            
            async process() {
                if (this.running >= this.concurrentLimit || this.queue.length === 0) return;
                
                this.running++;
                const { requestFn, resolve, reject } = this.queue.shift();
                
                try {
                    const result = await requestFn();
                    resolve(result);
                } catch (error) {
                    reject(error);
                } finally {
                    this.running--;
                    await new Promise(r => setTimeout(r, this.delay));
                    this.process();
                }
            }
            
            setConcurrentLimit(limit) { this.concurrentLimit = limit; }
            setDelay(delay) { this.delay = delay; }

        // ========== HTTP请求 ==========
        async function fetchHtml(url, useCache = true) {
            // 先检查缓存
            if (useCache) {
                const cached = await db.getCache(url);
                if (cached) {
                    await db.incrementCacheHit();
                    updateStorageInfo();
                    return { content: cached, success: true, url, fromCache: true };
                }
            }
            
            return requestQueue.add(async () => {
                await db.incrementRequest();
                
                const proxies = [
                    `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
                    `https://corsproxy.io/?${encodeURIComponent(url)}`,
                    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
                ];
                
                for (const proxyUrl of proxies) {
                    try {
                        const response = await fetch(proxyUrl, { signal: AbortSignal.timeout(15000) });
                        const data = await response.json();
                        if (data.contents || data) {
                            const content = data.contents || (typeof data === 'string' ? data : JSON.stringify(data));
                            if (useCache) await db.setCache(url, content);
                            updateStorageInfo();
                            return { content, success: true, url, fromCache: false };
                        }
                    } catch (e) { continue; }
                }
                
                return { content: '', success: false, error: '所有代理都失败', url };
            });
        }

            if (!input) { showToast('请输入JSON内容或URL', true); return; }
            if (input.startsWith('http://') || input.startsWith('https://')) { await importFromUrlDirect(input); return; }

        async function importFromUrlDirect(url) {
            const statusDiv = document.getElementById('importStatus');
            statusDiv.classList.remove('hidden');
            statusDiv.innerHTML = '正在从URL获取书源...';
            try {
                const proxies = [`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`, `https://corsproxy.io/?${encodeURIComponent(url)}`, `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`];
                let data = null;
                for (const proxyUrl of proxies) {
                    try {
                        statusDiv.innerHTML = `尝试代理: ${proxyUrl.split('?')[0]}...`;
                        const response = await fetch(proxyUrl, { signal: AbortSignal.timeout(30000) });
                        const result = await response.json();
                        const content = result.contents || result;
                        const jsonStr = typeof content === 'string' ? content : JSON.stringify(content);
                        data = JSON.parse(jsonStr);
                        break;
                    } catch (e) { statusDiv.innerHTML += `<br>失败: ${e.message}`; continue; }
                }
                if (data) { await processImportData(data); statusDiv.innerHTML = '导入成功！'; }
                else { statusDiv.innerHTML = '所有代理都失败'; showToast('获取书源失败', true); }
            } catch (e) { statusDiv.innerHTML = '错误: ' + e.message; showToast('导入失败: ' + e.message, true); }
        }
        
        async function processImportData(data) {
            const sources = Array.isArray(data) ? data : [data];
            let added = 0, updated = 0;
            for (const s of sources) {
                if (!s.bookSourceName || !s.bookSourceUrl) continue;
                const existingIndex = bookSources.findIndex(existing => existing.bookSourceUrl === s.bookSourceUrl);
                if (existingIndex >= 0) { bookSources[existingIndex] = { ...bookSources[existingIndex], ...s, enabled: true }; updated++; }
                else { bookSources.push({ ...s, enabled: true }); added++; }
                await db.setSource({ ...s, enabled: true });
            }
            updateSourceCount();
            updateSourceSelect();
            renderSourceList();
            document.getElementById('sourceInput').value = '';
            showToast(`成功导入 ${added} 个，更新 ${updated} 个书源`);
        }
        
        function importFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) { document.getElementById('sourceInput').value = e.target.result; importSources(); };
            reader.readAsText(file);
        }
        
        function importFromUrl() {
            const url = prompt('请输入书源JSON的URL:', 'https://www.yckceo.com/yuedu/shuyuans/json/id/1063.json');
            if (url) importFromUrlDirect(url);
        }
        
        async function toggleSource(index) {
            bookSources[index].enabled = bookSources[index].enabled === false ? true : false;
            await db.setSource(bookSources[index]);
            updateSourceCount();
            renderSourceList();
        }
        
        async function deleteSource(index) {
            if (confirm('确定删除此书源？')) {
                await db.deleteSource(bookSources[index].bookSourceUrl);
                bookSources.splice(index, 1);
                updateSourceCount();
                updateSourceSelect();
                renderSourceList();
                showToast('已删除');
            }
        }
        
        async function testAllSources() {
            showToast('开始测试所有书源...');
            const results = {};
            for (const source of bookSources) {
                try {
                    const searchUrl = (source.searchUrl || '').replace('{{key}}', '斗罗').replace('{{page}}', '1');
                    const fullUrl = searchUrl.startsWith('http') ? searchUrl : source.bookSourceUrl + searchUrl;
                    const result = await fetchHtml(fullUrl, false);
                    if (result.success) {
                        const rule = source.ruleSearch || {};
                        const parser = new AnalyzeRule().setContent(result.content, result.url);
                        const items = parser.getElements(rule.bookList);
                        results[source.bookSourceUrl] = items.length > 0;
                    } else results[source.bookSourceUrl] = false;
                } catch (e) { results[source.bookSourceUrl] = false; }
            }
            const failedCount = bookSources.filter(s => results[s.bookSourceUrl] === false).length;
            showToast(failedCount > 0 ? `测试完成，${failedCount} 个书源无效` : '所有书源测试通过！');
        }
        
        async function clearInvalidSources() {
            showToast('请先运行测试');
        }
        
        async function loadDefaultSources() {
            const defaults = [{ bookSourceName: "笔趣阁", bookSourceUrl: "https://www.biquge.com", searchUrl: "/search.php?keyword={{key}}", enabled: true, ruleSearch: { bookList: ".result-list .result-item", name: ".result-game-item-title a", author: ".result-game-item-info-tag:eq(0) span", bookUrl: ".result-game-item-title a@href" }, ruleToc: { chapterList: "#list dl dd a", chapterName: "text", chapterUrl: "href" }, ruleContent: { content: "#content" } }];
            let added = 0;
            for (const s of defaults) {
                if (!bookSources.some(existing => existing.bookSourceUrl === s.bookSourceUrl)) {
                    bookSources.push({ ...s });
                    await db.setSource(s);
                    added++;
                }
            }
            updateSourceCount();
            updateSourceSelect();
            renderSourceList();
            showToast(`已加载 ${added} 个默认书源`);
        }
        
        function exportSources() {
            if (!bookSources.length) { showToast('没有书源可导出', true); return; }
            const json = JSON.stringify(bookSources, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'book_sources.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('已导出');
        }
        
        async function clearSources() {
            if (confirm('确定要清空所有书源吗？')) {
                await db.clearSources();
                bookSources = [];
                updateSourceCount();
                updateSourceSelect();
                renderSourceList();
                showToast('已清空');
            }
        }
        
        // ========== 搜索 ==========
        
        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) return;
            const enabledSources = bookSources.filter(s => s.enabled !== false && s.searchUrl);
            if (!enabledSources.length) { showToast('请先添加书源', true); return; }
            const btn = document.getElementById('searchBtn');
            btn.disabled = true;
            btn.textContent = '搜索中...';
            searchResults = [];
            const sourceIdx = document.getElementById('sourceSelect').value;
            const sourcesToSearch = sourceIdx !== '' ? [enabledSources[parseInt(sourceIdx)]] : enabledSources;
            const statusDiv = document.getElementById('searchStatus');
            statusDiv.classList.remove('hidden');
            statusDiv.innerHTML = sourcesToSearch.map(s => `<div class="source-status loading" id="status-${s.bookSourceName.replace(/[^a-zA-Z0-9]/g, '_')}">${s.bookSourceName}: 等待中</div>`).join('');
            
            const searchPromises = sourcesToSearch.map(source => searchSource(source, keyword));
            const allResults = await Promise.all(searchPromises);
            searchResults = allResults.flat();
            
            const seen = new Set();
            searchResults = searchResults.filter(book => { const key = `${book.name}-${book.author}`; if (seen.has(key)) return false; seen.add(key); return true; });
            
            if (searchResults.length > 0) { displayResults(searchResults.slice(0, 50)); showToast(`找到 ${searchResults.length} 个结果`); }
            else showToast('未找到结果', true);
            
            btn.disabled = false;
            btn.textContent = '搜索';
        });
        
        async function searchSource(source, keyword) {
            const statusId = `status-${source.bookSourceName.replace(/[^a-zA-Z0-9]/g, '_')}`;
            const statusEl = document.getElementById(statusId);
            try {
                statusEl.className = 'source-status loading';
                statusEl.textContent = `${source.bookSourceName}: 搜索中...`;
                const searchUrl = (source.searchUrl || '').replace('{{key}}', encodeURIComponent(keyword)).replace('{{page}}', '1');
                const fullUrl = searchUrl.startsWith('http') ? searchUrl : source.bookSourceUrl + searchUrl;
                const result = await fetchHtml(fullUrl);
                if (!result.success) { statusEl.className = 'source-status error'; statusEl.textContent = `${source.bookSourceName}: 请求失败`; return []; }
                const rule = source.ruleSearch || {};
                const parser = new AnalyzeRule().setContent(result.content, result.url);
                const items = parser.getElements(rule.bookList);
                const books = items.map(item => {
                    const r = new AnalyzeRule().setContent(item, result.url);
                    const name = r.getString(rule.name);
                    if (!name) return null;
                    let bookUrl = r.getString(rule.bookUrl);
                    if (bookUrl && !bookUrl.startsWith('http')) bookUrl = resolveUrl(source.bookSourceUrl, bookUrl);
                    return { name, author: r.getString(rule.author), bookUrl, intro: r.getString(rule.intro), kind: r.getString(rule.kind), lastChapter: r.getString(rule.lastChapter), sourceName: source.bookSourceName, sourceUrl: source.bookSourceUrl, source };
                }).filter(b => b && b.name && b.bookUrl);
                statusEl.className = 'source-status success';
                statusEl.textContent = `${source.bookSourceName}: ${books.length}个${result.fromCache ? '(缓存)' : ''}`;
                return books;
            } catch (err) { statusEl.className = 'source-status error'; statusEl.textContent = `${source.bookSourceName}: ${err.message}`; return []; }
        }
        
        function resolveUrl(base, relative) {
            if (!relative) return '';
            if (relative.startsWith('http')) return relative;
            if (relative.startsWith('//')) return 'https:' + relative;
            if (relative.startsWith('/')) { try { return new URL(base).origin + relative; } catch (e) { return relative; } }
            try { return new URL(relative, base).href; } catch (e) { return relative; }
        }
        
        function displayResults(results) {
            const list = document.getElementById('bookList');
            document.getElementById('resultCount').textContent = `(${results.length})`;
            list.innerHTML = results.map((book, i) => `<div class="book-item" onclick="selectBook(${i})"><h3>《${book.name}》</h3><div class="meta">${book.author ? '作者: ' + book.author + ' | ' : ''}来源: ${book.sourceName}</div>${book.intro ? `<div class="intro">${book.intro}</div>` : ''}</div>`).join('');
            document.getElementById('resultsCard').classList.remove('hidden');
            document.getElementById('bookInfoCard').classList.add('hidden');
            document.getElementById('downloadCard').classList.add('hidden');
        }
        
        async function selectBook(index) {
            document.querySelectorAll('.book-item').forEach((item, i) => item.classList.toggle('selected', i === index));
            selectedBook = searchResults[index];
            selectedSource = selectedBook.source;
            document.getElementById('bookInfo').innerHTML = `<h3>《${selectedBook.name}》</h3><p style="color:rgba(255,255,255,0.6);margin-top:4px">${selectedBook.author ? '作者: ' + selectedBook.author : ''}</p><div class="loading" id="bookLoading">正在获取书籍信息...</div>`;
            document.getElementById('bookInfoCard').classList.remove('hidden');
            document.getElementById('chapterListSection').classList.add('hidden');
            document.getElementById('downloadActions').classList.add('hidden');
            try {
                const bookResult = await fetchHtml(selectedBook.bookUrl);
                if (bookResult.success && selectedSource.ruleBookInfo) {
                    const infoRules = selectedSource.ruleBookInfo;
                    const parser = new AnalyzeRule().setContent(bookResult.content, bookResult.url);
                    if (!selectedBook.author) selectedBook.author = parser.getString(infoRules.author);
                    selectedBook.intro = parser.getString(infoRules.intro) || selectedBook.intro;
                    let tocUrl = parser.getString(infoRules.tocUrl);
                    if (tocUrl && !tocUrl.startsWith('http')) tocUrl = resolveUrl(selectedSource.bookSourceUrl, tocUrl);
                    selectedBook.tocUrl = tocUrl || selectedBook.bookUrl;
                } else selectedBook.tocUrl = selectedBook.bookUrl;
                chapters = [];
                if (selectedSource.ruleToc) {
                    const tocResult = await fetchHtml(selectedBook.tocUrl);
                    if (tocResult.success) {
                        const tocRules = selectedSource.ruleToc;
                        const parser = new AnalyzeRule().setContent(tocResult.content, tocResult.url);
                        const items = parser.getElements(tocRules.chapterList);
                        chapters = items.map((item, idx) => {
                            const r = new AnalyzeRule().setContent(item, tocResult.url);
                            let chapterUrl = r.getString(tocRules.chapterUrl);
                            if (chapterUrl && !chapterUrl.startsWith('http')) chapterUrl = resolveUrl(selectedBook.tocUrl, chapterUrl);
                            return { name: r.getString(tocRules.chapterName), url: chapterUrl, selected: false };
                        }).filter(ch => ch.name && ch.url);
                    }
                }
                document.getElementById('bookLoading').classList.add('hidden');
                document.getElementById('bookInfo').innerHTML = `<h3>《${selectedBook.name}》</h3><p style="color:rgba(255,255,255,0.6);margin-top:4px">${selectedBook.author ? '作者: ' + selectedBook.author : ''}</p>${selectedBook.intro ? `<p style="color:rgba(255,255,255,0.5);margin-top:8px;font-size:0.85rem">${selectedBook.intro.substring(0, 200)}...</p>` : ''}`;
                if (chapters.length > 0) {
                    document.getElementById('chapterCount').textContent = `(${chapters.length})`;
                    document.getElementById('chapterList').innerHTML = chapters.map((ch, i) => `<div class="chapter-item" onclick="toggleChapter(${i})"><input type="checkbox" id="ch${i}" ${ch.selected ? 'checked' : ''}><label for="ch${i}">${ch.name}</label></div>`).join('');
                    document.getElementById('chapterListSection').classList.remove('hidden');
                    document.getElementById('downloadActions').classList.remove('hidden');
                } else showToast('未找到章节列表', true);
            } catch (err) { document.getElementById('bookLoading').textContent = '获取失败: ' + err.message; showToast('获取书籍信息失败', true); }
        }
        
        function toggleChapter(index) { chapters[index].selected = !chapters[index].selected; document.getElementById('ch' + index).checked = chapters[index].selected; }
        function selectAllChapters() { chapters.forEach((ch, i) => { ch.selected = true; document.getElementById('ch' + i).checked = true; }); }
        function deselectAllChapters() { chapters.forEach((ch, i) => { ch.selected = false; document.getElementById('ch' + i).checked = false; }); }
        
        // ========== 下载 ==========
        
        async function downloadSelected() { const selected = chapters.filter(ch => ch.selected); if (!selected.length) { showToast('请先选择章节', true); return; } await downloadChapters(selected); }
        async function downloadAll() { await downloadChapters(chapters.slice(0, 500)); }
        
        async function downloadChapters(chaptersToDownload) {
            document.getElementById('downloadCard').classList.remove('hidden');
            document.getElementById('downloadProgressFill').style.width = '0%';
            document.getElementById('downloadProgressText').textContent = '准备下载...';
            document.getElementById('saveActions').classList.add('hidden');
            document.getElementById('downloadLog').innerHTML = '';
            downloadedContent = '';
            const contentRule = selectedSource.ruleContent?.content || '#content';
            downloadedContent = `书名: ${selectedBook.name}\n作者: ${selectedBook.author || '未知'}\n来源: ${selectedBook.sourceName}\n下载时间: ${new Date().toLocaleString()}\n\n${'='.repeat(50)}\n\n`;
            let success = 0, fail = 0;
            const logPanel = document.getElementById('downloadLog');
            const settings = await db.getSettings();
            
            for (let i = 0; i < chaptersToDownload.length; i++) {
                const ch = chaptersToDownload[i];
                try {
                    document.getElementById('downloadProgressText').textContent = `下载中: ${ch.name} (${i + 1}/${chaptersToDownload.length})`;
                    const result = await fetchHtml(ch.url);
                    if (result.success) {
                        const parser = new AnalyzeRule().setContent(result.content, result.url);
                        let content = parser.getString(contentRule);
                        if (content) {
                            content = content.replace(/&nbsp;/g, ' ').replace(/<br\s*\/?>/gi, '\n').replace(/<[^>]+>/g, '').trim();
                            downloadedContent += `第${i + 1}章 ${ch.name}\n\n${content}\n\n`;
                            success++;
                            logPanel.innerHTML += `<div class="log-item log-success">✓ ${ch.name}${result.fromCache ? '(缓存)' : ''}</div>`;
                        } else { fail++; logPanel.innerHTML += `<div class="log-item log-error">✗ ${ch.name}: 内容为空</div>`; }
                    } else { fail++; logPanel.innerHTML += `<div class="log-item log-error">✗ ${ch.name}: 请求失败</div>`; }
                } catch (e) { fail++; logPanel.innerHTML += `<div class="log-item log-error">✗ ${ch.name}: ${e.message}</div>`; }
                document.getElementById('downloadProgressFill').style.width = Math.round((i + 1) / chaptersToDownload.length * 100) + '%';
                logPanel.scrollTop = logPanel.scrollHeight;
                await new Promise(r => setTimeout(r, settings.requestDelay));
            }
            document.getElementById('downloadProgressText').textContent = `下载完成！成功: ${success}, 失败: ${fail}`;
            document.getElementById('saveActions').classList.remove('hidden');
            await saveToHistory();
            showToast('下载完成！');
        }
        
        function saveToFile() {
            if (!downloadedContent) return showToast('没有内容', true);
            const blob = new Blob([downloadedContent], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${selectedBook.name}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('文件已保存！');
        }
        
        async function copyToClipboard() {
            if (!downloadedContent) return showToast('没有内容', true);
            try { await navigator.clipboard.writeText(downloadedContent.substring(0, 500000)); showToast('已复制！'); } catch (e) { showToast('复制失败', true); }
        }
        
        // ========== 历史 ==========
        
        async function saveToHistory() {
            const item = { id: Date.now(), name: selectedBook.name, author: selectedBook.author, source: selectedBook.sourceName, content: downloadedContent.substring(0, 2000000), date: new Date().toLocaleString(), size: (downloadedContent.length / 1024).toFixed(1) + ' KB' };
            await db.addHistory(item);
        }
        
        async function renderHistory() {
            const list = document.getElementById('historyList');
            const history = await db.getHistory();
            if (!history.length) { list.innerHTML = '<p class="loading">暂无记录</p>'; return; }
            list.innerHTML = history.map(item => `<div class="history-item"><div class="history-info"><h4>《${item.name}》</h4><p>${item.author || ''} | ${item.size} | ${item.date}</p></div><button class="btn btn-small" onclick="downloadHistoryItem(${item.id})">保存</button></div>`).join('');
        }
        
        async function downloadHistoryItem(id) {
            const history = await db.getHistory();
            const item = history.find(h => h.id === id);
            if (item) {
                const blob = new Blob([item.content], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${item.name}.txt`;
                a.click();
                URL.revokeObjectURL(url);
            }
        }
        
        async function clearHistory() {
            await db.clearHistory();
            renderHistory();
            showToast('已清空');
        }
        
        // 启动
        init();
    </script>
</body>
</html>
