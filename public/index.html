<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说下载器 - 基于 Legado</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📚 小说下载器</h1>
            <p>基于 Legado 开源项目 | 支持多书源搜索下载</p>
        </header>
        
        <nav class="tabs">
            <button class="tab-btn active" data-tab="search">🔍 搜索</button>
            <button class="tab-btn" data-tab="bookshelf">📚 书架</button>
            <button class="tab-btn" data-tab="explore">🌐 发现</button>
            <button class="tab-btn" data-tab="sources">📖 书源</button>
            <button class="tab-btn" data-tab="subscribe">📡 订阅</button>
            <button class="tab-btn" data-tab="settings">⚙️ 设置</button>
        </nav>
        
        <!-- 搜索 -->
        <div id="searchTab" class="tab-content active">
            <div class="card">
                <div class="form-row">
                    <input type="text" id="searchInput" placeholder="输入书名或作者搜索..." style="flex:1">
                    <button class="btn btn-primary" id="searchBtn">搜索</button>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <span class="card-title">搜索结果</span>
                    <span id="sourceCount">0 个书源</span>
                </div>
                <div id="searchResults" class="book-list">
                    <div class="empty">输入关键词开始搜索</div>
                </div>
            </div>
        </div>
        
        <!-- 书架 -->
        <div id="bookshelfTab" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">我的书架</span>
                    <span id="bookshelfCount">0 本</span>
                </div>
                <div id="bookshelfList" class="book-list">
                    <div class="empty">书架空空如也，去搜索添加吧</div>
                </div>
            </div>
        </div>
        
        <!-- 发现 -->
        <div id="exploreTab" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">发现好书</span>
                </div>
                <div id="exploreSourceSelect"></div>
            </div>
            
            <div class="card">
                <div id="exploreResults" class="book-list">
                    <div class="empty">选择书源开始发现</div>
                </div>
            </div>
        </div>
        
        <!-- 书源管理 -->
        <div id="sourcesTab" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">导入书源</span>
                </div>
                <div class="form-row">
                    <input type="file" id="importInput" accept=".json,.txt" style="display:none">
                    <button class="btn btn-primary" onclick="document.getElementById('importInput').click()">
                        📁 本地导入
                    </button>
                    <button class="btn btn-secondary" onclick="app.importFromUrl()">
                        🔗 URL导入
                    </button>
                    <button class="btn btn-secondary" onclick="app.exportSources()">
                        📤 导出书源
                    </button>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <span class="card-title">书源列表</span>
                    <button class="btn btn-small btn-secondary" onclick="app.testSources()">
                        🧪 测试书源
                    </button>
                </div>
                <div id="testStatus" class="hidden"></div>
                <div id="sourceList" class="source-list">
                    <div class="empty">暂无书源，请导入书源</div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <span class="card-title">失效书源</span>
                </div>
                <div id="invalidSourceList">
                    <div class="empty">暂无失效书源</div>
                </div>
            </div>
        </div>
        
        <!-- 订阅 -->
        <div id="subscribeTab" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">添加订阅</span>
                </div>
                <div class="form-row">
                    <button class="btn btn-primary" onclick="app.addSubscription()">
                        ➕ 添加订阅
                    </button>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <span class="card-title">订阅列表</span>
                </div>
                <div id="subscribeList" class="subscribe-list">
                    <div class="empty">暂无订阅</div>
                </div>
            </div>
        </div>
        
        <!-- 设置 -->
        <div id="settingsTab" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">搜索设置</span>
                </div>
                <div class="form-group">
                    <label>搜索并发数</label>
                    <input type="number" id="searchConcurrent" value="10" min="1" max="50">
                </div>
                <div class="form-group">
                    <label>下载并发数</label>
                    <input type="number" id="downloadConcurrent" value="10" min="1" max="50">
                </div>
                <div class="form-group">
                    <label>重试次数</label>
                    <input type="number" id="retryCount" value="2" min="0" max="5">
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="skipInvalidSource" checked>
                        跳过失效书源
                    </label>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <span class="card-title">数据管理</span>
                </div>
                <div class="form-row">
                    <button class="btn btn-secondary" onclick="app.clearInvalidSources()">
                        清除失效标记
                    </button>
                    <button class="btn btn-danger" onclick="app.clearAllData()">
                        🗑️ 清除所有数据
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 模态框 -->
    <div id="bookModal" class="modal">
        <div id="bookModalContent" class="modal-content">
            <div class="loading">加载中...</div>
        </div>
    </div>
    
    <script>
        document.getElementById('bookModal').addEventListener('click', function(e) {
            if (e.target === this) {
                app.closeModal();
            }
        });
    </script>
    
    <!-- JS模块 -->
    <script src="js/booksource-manager.js"></script>
    <script src="js/subscribe-manager.js"></script>
    <script src="js/cache-manager.js"></script>
    <script src="js/bookshelf-manager.js"></script>
    <script src="js/html-parser.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
