<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说下载器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { 
            font-size: 1.8rem; 
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { font-size: 0.9rem; opacity: 0.7; margin-top: 5px; }
        
        .card { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; 
            padding: 20px; 
            margin-bottom: 15px;
        }
        
        .search-form { display: flex; gap: 10px; }
        .search-input { 
            flex: 1; 
            padding: 12px 15px; 
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 8px; 
            font-size: 1rem; 
        }
        .search-input::placeholder { color: rgba(255,255,255,0.5); }
        .search-input:focus { outline: none; border-color: #e94560; }
        
        .btn { 
            padding: 12px 20px; 
            background: linear-gradient(90deg, #e94560, #ff6b6b); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 1rem; 
            cursor: pointer; 
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-success { background: linear-gradient(90deg, #00b894, #00cec9); }
        
        .book-item { 
            padding: 15px; 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; 
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .book-item:hover { border-color: #e94560; background: rgba(233, 69, 96, 0.1); }
        .book-item.selected { border-color: #e94560; background: rgba(233, 69, 96, 0.2); }
        .book-item h3 { font-size: 1rem; margin-bottom: 5px; }
        .book-item .meta { color: rgba(255,255,255,0.6); font-size: 0.85rem; }
        
        .progress { margin-top: 15px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #e94560, #ff6b6b); transition: width 0.3s; }
        .progress-text { text-align: center; color: rgba(255,255,255,0.8); font-size: 0.9rem; }
        
        .hidden { display: none !important; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            background: rgba(0, 184, 148, 0.9);
            color: white;
            border-radius: 8px;
            transform: translateX(200%);
            transition: transform 0.3s;
            z-index: 1000;
        }
        .toast.show { transform: translateX(0); }
        .toast.error { background: rgba(214, 48, 49, 0.9); }
        
        .download-actions { display: flex; gap: 10px; margin-top: 15px; }
        
        .history-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px; 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .history-info h4 { font-size: 0.95rem; }
        .history-info p { font-size: 0.8rem; color: rgba(255,255,255,0.5); }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab { 
            padding: 8px 16px; 
            background: rgba(255,255,255,0.1); 
            color: white; 
            border: none;
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 0.9rem;
        }
        .tab.active { background: linear-gradient(90deg, #e94560, #ff6b6b); }
        
        .source-input {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 小说下载器</h1>
            <p>输入小说名称，自动搜索下载</p>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('search')">🔍 搜索下载</button>
            <button class="tab" onclick="showTab('history')">📁 下载历史</button>
        </div>
        
        <!-- 搜索页面 -->
        <div id="searchTab">
            <div class="card">
                <form class="search-form" id="searchForm">
                    <input type="text" class="search-input" id="searchInput" placeholder="输入小说名称..." required>
                    <button type="submit" class="btn" id="searchBtn">搜索</button>
                </form>
            </div>
            
            <div class="card hidden" id="resultsCard">
                <h3 style="margin-bottom:12px">搜索结果 <span id="resultCount" style="opacity:0.6"></span></h3>
                <div id="bookList"></div>
            </div>
            
            <div class="card hidden" id="downloadCard">
                <div id="downloadInfo"></div>
                <div class="progress hidden" id="progressSection">
                    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
                    <div class="progress-text" id="progressText">准备中...</div>
                </div>
                <div class="download-actions hidden" id="saveActions">
                    <button class="btn btn-success" onclick="saveToFile()">💾 保存到本地</button>
                    <button class="btn" onclick="copyToClipboard()">📋 复制</button>
                </div>
            </div>
        </div>
        
        <!-- 历史页面 -->
        <div id="historyTab" class="hidden">
            <div class="card">
                <h3 style="margin-bottom:12px">下载历史</h3>
                <div id="historyList"></div>
                <button class="btn" onclick="clearHistory()" style="margin-top:12px;background:rgba(255,255,255,0.1)">清空历史</button>
            </div>
        </div>
        
        <div style="text-align:center;color:rgba(255,255,255,0.4);margin-top:15px;font-size:0.8rem">
            书源来源于网络，仅供学习交流
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        // 书源列表
        const SOURCES = [
            {
                name: "贼吧网",
                searchUrl: "https://m.zei8.vip/search.php?keyword=",
                baseUrl: "https://m.zei8.vip"
            }
        ];
        
        let searchResults = [];
        let selectedBook = null;
        let downloadedContent = '';
        let downloadHistory = JSON.parse(localStorage.getItem('novelHistory') || '[]');
        
        // Toast
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // Tab切换
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('searchTab').classList.toggle('hidden', tab !== 'search');
            document.getElementById('historyTab').classList.toggle('hidden', tab !== 'history');
            if (tab === 'history') renderHistory();
        }
        
        // 搜索
        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) return;
            
            const btn = document.getElementById('searchBtn');
            btn.disabled = true;
            btn.textContent = '搜索中...';
            
            try {
                // 使用代理搜索
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://m.zei8.vip/search.php?keyword=' + keyword)}`);
                const data = await response.json();
                const html = data.contents;
                
                // 解析搜索结果
                const results = [];
                const bookPattern = /<a[^>]*href="(\/txt\/\d+\.html)"[^>]*>([^<]+)<\/a>/g;
                let match;
                
                while ((match = bookPattern.exec(html)) !== null) {
                    const url = match[1];
                    const name = match[2].trim();
                    if (name && !results.some(r => r.name === name)) {
                        results.push({
                            name: name,
                            author: '',
                            source: '贼吧网',
                            url: 'https://m.zei8.vip' + url
                        });
                    }
                }
                
                if (results.length > 0) {
                    searchResults = results;
                    displayResults(results);
                    showToast(`找到 ${results.length} 个结果`);
                } else {
                    showToast('未找到结果，请尝试其他关键词', true);
                }
            } catch (err) {
                showToast('搜索失败: ' + err.message, true);
            }
            
            btn.disabled = false;
            btn.textContent = '搜索';
        });
        
        function displayResults(results) {
            const list = document.getElementById('bookList');
            document.getElementById('resultCount').textContent = `(${results.length})`;
            
            list.innerHTML = results.map((book, i) => `
                <div class="book-item" onclick="selectBook(${i})">
                    <h3>《${book.name}》</h3>
                    <div class="meta">来源: ${book.source}</div>
                </div>
            `).join('');
            
            document.getElementById('resultsCard').classList.remove('hidden');
            document.getElementById('downloadCard').classList.add('hidden');
        }
        
        function selectBook(index) {
            document.querySelectorAll('.book-item').forEach((item, i) => {
                item.classList.toggle('selected', i === index);
            });
            selectedBook = searchResults[index];
            
            document.getElementById('downloadInfo').innerHTML = `
                <h3>《${selectedBook.name}》</h3>
                <p style="color:rgba(255,255,255,0.6);margin-top:5px">来源: ${selectedBook.source}</p>
                <button class="btn" id="downloadBtn" style="margin-top:15px" onclick="startDownload()">📥 开始下载</button>
            `;
            document.getElementById('downloadCard').classList.remove('hidden');
            document.getElementById('progressSection').classList.add('hidden');
            document.getElementById('saveActions').classList.add('hidden');
        }
        
        // 下载
        async function startDownload() {
            if (!selectedBook) return;
            
            document.getElementById('progressSection').classList.remove('hidden');
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressText').textContent = '正在获取书籍信息...';
            downloadedContent = '';
            
            try {
                // 获取书籍详情页
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(selectedBook.url)}`);
                const data = await response.json();
                const html = data.contents;
                
                // 查找下载链接
                const downloadPattern = /<a[^>]*href="(https?:\/\/txt\.zei8\.me\/[^"]+\.zip)"[^>]*>/i;
                const match = html.match(downloadPattern);
                
                if (match) {
                    document.getElementById('progressText').textContent = '找到下载链接，正在获取文件...';
                    document.getElementById('progressFill').style.width = '30%';
                    
                    const zipUrl = match[1];
                    
                    // 尝试获取ZIP文件
                    try {
                        const zipResponse = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(zipUrl)}`);
                        const zipBlob = await zipResponse.blob();
                        
                        document.getElementById('progressFill').style.width = '60%';
                        document.getElementById('progressText').textContent = '正在解压文件...';
                        
                        // 使用JSZip解压
                        if (typeof JSZip === 'undefined') {
                            // 动态加载JSZip
                            const script = document.createElement('script');
                            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
                            document.head.appendChild(script);
                            await new Promise(resolve => script.onload = resolve);
                        }
                        
                        const zip = await JSZip.loadAsync(zipBlob);
                        const files = Object.keys(zip.files);
                        const txtFile = files.find(f => f.endsWith('.txt'));
                        
                        if (txtFile) {
                            downloadedContent = await zip.file(txtFile).async('string');
                            
                            // 尝试检测编码
                            if (downloadedContent.includes('�')) {
                                // 可能是GBK编码
                                downloadedContent = await zip.file(txtFile).async('uint8array');
                                // 简单的GBK解码
                                const decoder = new TextDecoder('gbk');
                                downloadedContent = decoder.decode(downloadedContent);
                            }
                            
                            document.getElementById('progressFill').style.width = '100%';
                            document.getElementById('progressText').textContent = '下载完成！';
                            document.getElementById('saveActions').classList.remove('hidden');
                            
                            saveToHistory();
                            showToast('下载完成！点击保存到本地');
                        } else {
                            throw new Error('ZIP文件中没有找到TXT文件');
                        }
                    } catch (zipErr) {
                        throw new Error('下载文件失败: ' + zipErr.message);
                    }
                } else {
                    throw new Error('未找到下载链接');
                }
            } catch (err) {
                document.getElementById('progressText').textContent = '错误: ' + err.message;
                showToast('下载失败: ' + err.message, true);
            }
        }
        
        // 保存到本地
        function saveToFile() {
            if (!downloadedContent) return showToast('没有内容', true);
            
            const blob = new Blob([downloadedContent], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${selectedBook.name}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('文件已保存！');
        }
        
        // 复制
        async function copyToClipboard() {
            if (!downloadedContent) return showToast('没有内容', true);
            try {
                await navigator.clipboard.writeText(downloadedContent.substring(0, 100000)); // 限制大小
                showToast('已复制到剪贴板！');
            } catch (e) {
                showToast('复制失败', true);
            }
        }
        
        // 历史
        function saveToHistory() {
            const item = {
                id: Date.now(),
                name: selectedBook.name,
                source: selectedBook.source,
                content: downloadedContent.substring(0, 500000), // 限制大小
                date: new Date().toLocaleString(),
                size: (downloadedContent.length / 1024).toFixed(1) + ' KB'
            };
            downloadHistory.unshift(item);
            if (downloadHistory.length > 10) downloadHistory = downloadHistory.slice(0, 10);
            localStorage.setItem('novelHistory', JSON.stringify(downloadHistory));
        }
        
        function renderHistory() {
            const list = document.getElementById('historyList');
            if (!downloadHistory.length) {
                list.innerHTML = '<p style="text-align:center;color:rgba(255,255,255,0.5);padding:20px">暂无记录</p>';
                return;
            }
            list.innerHTML = downloadHistory.map(item => `
                <div class="history-item">
                    <div class="history-info">
                        <h4>《${item.name}》</h4>
                        <p>${item.size} | ${item.date}</p>
                    </div>
                    <button class="btn" style="padding:6px 12px;font-size:0.8rem" onclick="downloadHistoryItem(${item.id})">保存</button>
                </div>
            `).join('');
        }
        
        function downloadHistoryItem(id) {
            const item = downloadHistory.find(h => h.id === id);
            if (item) {
                const blob = new Blob([item.content], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${item.name}.txt`;
                a.click();
                URL.revokeObjectURL(url);
            }
        }
        
        function clearHistory() {
            downloadHistory = [];
            localStorage.setItem('novelHistory', '[]');
            renderHistory();
            showToast('历史已清空');
        }
        
        // 初始化
        renderHistory();
    </script>
</body>
</html>
