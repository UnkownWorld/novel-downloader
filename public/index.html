<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说下载器 - 基于Legado书源</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { 
            font-size: 2rem; 
            margin-bottom: 10px; 
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { font-size: 1rem; opacity: 0.8; }
        
        .card { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; 
            padding: 25px; 
            margin-bottom: 20px;
        }
        
        .search-form { display: flex; gap: 10px; flex-wrap: wrap; }
        .search-input { 
            flex: 1; 
            min-width: 200px; 
            padding: 12px 15px; 
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 8px; 
            font-size: 1rem; 
        }
        .search-input::placeholder { color: rgba(255,255,255,0.5); }
        .search-input:focus { outline: none; border-color: #e94560; }
        
        .btn { 
            padding: 12px 25px; 
            background: linear-gradient(90deg, #e94560, #ff6b6b); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 1rem; 
            cursor: pointer; 
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-success { background: linear-gradient(90deg, #00b894, #00cec9); }
        
        .options { display: flex; gap: 15px; margin-top: 15px; flex-wrap: wrap; }
        .option-group { display: flex; align-items: center; gap: 8px; }
        .option-group label { font-size: 0.9rem; opacity: 0.9; }
        .option-group select { 
            padding: 8px 12px; 
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 5px;
        }
        .option-group select option { background: #1a1a2e; }
        
        .book-list { display: grid; gap: 10px; max-height: 400px; overflow-y: auto; }
        .book-item { 
            display: flex; 
            gap: 12px; 
            padding: 15px; 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; 
            cursor: pointer; 
            transition: all 0.3s;
            background: rgba(255,255,255,0.02);
        }
        .book-item:hover { border-color: #e94560; background: rgba(233, 69, 96, 0.1); }
        .book-item.selected { border-color: #e94560; background: rgba(233, 69, 96, 0.15); }
        .book-info { flex: 1; }
        .book-info h3 { font-size: 1rem; margin-bottom: 3px; }
        .book-info .meta { color: rgba(255,255,255,0.6); font-size: 0.85rem; }
        
        .progress { margin-top: 15px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #e94560, #ff6b6b); transition: width 0.3s; }
        .progress-text { text-align: center; color: rgba(255,255,255,0.8); font-size: 0.9rem; }
        
        .hidden { display: none !important; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            background: rgba(0, 184, 148, 0.9);
            color: white;
            border-radius: 8px;
            transform: translateX(200%);
            transition: transform 0.3s;
            z-index: 1000;
        }
        .toast.show { transform: translateX(0); }
        .toast.error { background: rgba(214, 48, 49, 0.9); }
        
        .download-actions { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        
        .preview { 
            margin-top: 15px; 
            padding: 15px; 
            background: rgba(0,0,0,0.3); 
            border-radius: 8px; 
            font-size: 0.85rem;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .source-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .source-section h3 { margin-bottom: 10px; font-size: 1rem; }
        .source-section textarea { 
            width: 100%; 
            height: 100px; 
            padding: 10px; 
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            border-radius: 8px; 
            font-family: monospace; 
            font-size: 0.85rem; 
            resize: vertical; 
        }
        .source-section textarea::placeholder { color: rgba(255,255,255,0.3); }
        
        .history-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px; 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.02);
        }
        .history-info h4 { font-size: 0.95rem; }
        .history-info p { font-size: 0.8rem; color: rgba(255,255,255,0.5); }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { 
            padding: 10px 20px; 
            background: rgba(255,255,255,0.1); 
            color: white; 
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 0.9rem;
        }
        .tab.active { background: linear-gradient(90deg, #e94560, #ff6b6b); border-color: transparent; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 小说下载器</h1>
            <p>输入小说名称，自动搜索并下载</p>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('search')">🔍 搜索下载</button>
            <button class="tab" onclick="showTab('history')">📁 下载历史</button>
        </div>
        
        <!-- 搜索页面 -->
        <div id="searchTab">
            <div class="card">
                <form class="search-form" id="searchForm">
                    <input type="text" class="search-input" id="searchInput" placeholder="输入小说名称..." required>
                    <button type="submit" class="btn" id="searchBtn">搜索</button>
                </form>
                <div class="options">
                    <div class="option-group">
                        <label>下载章数:</label>
                        <select id="chapterLimit">
                            <option value="50">前50章</option>
                            <option value="100" selected>前100章</option>
                            <option value="200">前200章</option>
                            <option value="0">全部</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="card hidden" id="resultsCard">
                <h3 style="margin-bottom:15px">搜索结果 <span id="resultCount" style="opacity:0.6"></span></h3>
                <div class="book-list" id="bookList"></div>
            </div>
            
            <div class="card hidden" id="downloadCard">
                <div id="downloadInfo"></div>
                <div class="progress hidden" id="progressSection">
                    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
                    <div class="progress-text" id="progressText">准备中...</div>
                </div>
                <div class="download-actions hidden" id="saveActions">
                    <button class="btn btn-success" onclick="saveToFile()">💾 保存到本地</button>
                    <button class="btn" onclick="copyToClipboard()">📋 复制内容</button>
                </div>
                <div class="preview hidden" id="preview"></div>
            </div>
        </div>
        
        <!-- 历史页面 -->
        <div id="historyTab" class="hidden">
            <div class="card">
                <h3 style="margin-bottom:15px">下载历史</h3>
                <div id="historyList"></div>
                <button class="btn" onclick="clearHistory()" style="margin-top:15px;background:rgba(255,255,255,0.1)">清空历史</button>
            </div>
        </div>
        
        <div style="text-align:center;color:rgba(255,255,255,0.4);margin-top:20px;font-size:0.85rem">
            书源来源于网络，仅供学习交流
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        // 书源列表
        const BOOK_SOURCES = [
            {
                name: "笔趣阁",
                searchUrl: "https://www.biquge.com/search.php?keyword=",
                baseUrl: "https://www.biquge.com"
            },
            {
                name: "起点中文网",
                searchUrl: "https://www.qidian.com/so/",
                baseUrl: "https://www.qidian.com"
            }
        ];
        
        let searchResults = [];
        let selectedBook = null;
        let downloadedContent = '';
        let downloadHistory = JSON.parse(localStorage.getItem('novelHistory') || '[]');
        
        // Toast
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // Tab切换
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('searchTab').classList.toggle('hidden', tab !== 'search');
            document.getElementById('historyTab').classList.toggle('hidden', tab !== 'history');
            if (tab === 'history') renderHistory();
        }
        
        // 搜索
        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) return;
            
            const btn = document.getElementById('searchBtn');
            btn.disabled = true;
            btn.textContent = '搜索中...';
            
            // 模拟搜索结果（实际需要后端API）
            searchResults = [
                { name: keyword, author: '佚名', source: '笔趣阁', url: '#' },
                { name: keyword + ' 续集', author: '佚名', source: '起点中文网', url: '#' }
            ];
            
            displayResults(searchResults);
            btn.disabled = false;
            btn.textContent = '搜索';
            showToast('演示模式：请直接点击书籍下载');
        });
        
        function displayResults(results) {
            const list = document.getElementById('bookList');
            document.getElementById('resultCount').textContent = `(${results.length})`;
            
            list.innerHTML = results.map((book, i) => `
                <div class="book-item" onclick="selectBook(${i})">
                    <div class="book-info">
                        <h3>《${book.name}》</h3>
                        <div class="meta">作者: ${book.author} | 来源: ${book.source}</div>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('resultsCard').classList.remove('hidden');
            document.getElementById('downloadCard').classList.add('hidden');
        }
        
        function selectBook(index) {
            document.querySelectorAll('.book-item').forEach((item, i) => {
                item.classList.toggle('selected', i === index);
            });
            selectedBook = searchResults[index];
            
            document.getElementById('downloadInfo').innerHTML = `
                <h3>《${selectedBook.name}》</h3>
                <p style="color:rgba(255,255,255,0.6);margin-top:5px">作者: ${selectedBook.author} | ${selectedBook.source}</p>
            `;
            document.getElementById('downloadCard').classList.remove('hidden');
            document.getElementById('progressSection').classList.add('hidden');
            document.getElementById('saveActions').classList.add('hidden');
            document.getElementById('preview').classList.add('hidden');
            document.getElementById('downloadBtn')?.classList.remove('hidden');
        }
        
        // 模拟下载
        async function startDownload() {
            if (!selectedBook) return;
            
            document.getElementById('progressSection').classList.remove('hidden');
            downloadedContent = '';
            
            // 生成模拟内容
            const chapters = parseInt(document.getElementById('chapterLimit').value) || 100;
            
            downloadedContent = `书名: ${selectedBook.name}\n作者: ${selectedBook.author}\n来源: ${selectedBook.source}\n下载时间: ${new Date().toLocaleString()}\n\n${'='.repeat(40)}\n\n`;
            
            for (let i = 1; i <= chapters; i++) {
                const progress = Math.round(i / chapters * 100);
                document.getElementById('progressFill').style.width = progress + '%';
                document.getElementById('progressText').textContent = `下载中: 第${i}章 (${progress}%)`;
                
                downloadedContent += `第${i}章 章节标题${i}\n\n`;
                downloadedContent += `这是第${i}章的内容。这里是小说正文，包含精彩的剧情和人物对话...\n\n`.repeat(10);
                downloadedContent += '\n';
                
                await new Promise(r => setTimeout(r, 20));
            }
            
            document.getElementById('progressText').textContent = '下载完成！';
            document.getElementById('preview').textContent = downloadedContent.substring(0, 1000) + '...\n\n(更多内容请保存查看)';
            document.getElementById('preview').classList.remove('hidden');
            document.getElementById('saveActions').classList.remove('hidden');
            
            // 保存历史
            saveToHistory();
            showToast('下载完成！点击保存到本地');
        }
        
        // 保存到本地
        function saveToFile() {
            if (!downloadedContent) return showToast('没有内容', true);
            
            const blob = new Blob([downloadedContent], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${selectedBook.name}_${selectedBook.author}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('文件已保存！');
        }
        
        // 复制
        async function copyToClipboard() {
            if (!downloadedContent) return showToast('没有内容', true);
            try {
                await navigator.clipboard.writeText(downloadedContent);
                showToast('已复制到剪贴板！');
            } catch (e) {
                showToast('复制失败', true);
            }
        }
        
        // 历史
        function saveToHistory() {
            const item = {
                id: Date.now(),
                name: selectedBook.name,
                author: selectedBook.author,
                source: selectedBook.source,
                content: downloadedContent,
                date: new Date().toLocaleString(),
                size: (downloadedContent.length / 1024).toFixed(1) + ' KB'
            };
            downloadHistory.unshift(item);
            if (downloadHistory.length > 20) downloadHistory = downloadHistory.slice(0, 20);
            localStorage.setItem('novelHistory', JSON.stringify(downloadHistory));
        }
        
        function renderHistory() {
            const list = document.getElementById('historyList');
            if (!downloadHistory.length) {
                list.innerHTML = '<p style="text-align:center;color:rgba(255,255,255,0.5);padding:20px">暂无记录</p>';
                return;
            }
            list.innerHTML = downloadHistory.map(item => `
                <div class="history-item">
                    <div class="history-info">
                        <h4>《${item.name}》</h4>
                        <p>${item.author} | ${item.size} | ${item.date}</p>
                    </div>
                    <button class="btn" style="padding:6px 12px;font-size:0.8rem" onclick="downloadHistoryItem(${item.id})">保存</button>
                </div>
            `).join('');
        }
        
        function downloadHistoryItem(id) {
            const item = downloadHistory.find(h => h.id === id);
            if (item) {
                const blob = new Blob([item.content], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${item.name}_${item.author}.txt`;
                a.click();
                URL.revokeObjectURL(url);
            }
        }
        
        function clearHistory() {
            downloadHistory = [];
            localStorage.setItem('novelHistory', '[]');
            renderHistory();
            showToast('历史已清空');
        }
        
        // 初始化
        renderHistory();
        
        // 添加下载按钮点击事件
        document.getElementById('downloadInfo').addEventListener('click', (e) => {
            if (e.target.id === 'downloadBtn') startDownload();
        });
        
        // 动态添加下载按钮
        const downloadInfoDiv = document.getElementById('downloadInfo');
        downloadInfoDiv.innerHTML += '<button class="btn" id="downloadBtn" style="margin-top:15px">📥 开始下载</button>';
    </script>
</body>
</html>
