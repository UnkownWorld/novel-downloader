<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说下载器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 15px;
            color: #fff;
            font-size: 14px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { 
            font-size: 1.6rem; 
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { font-size: 0.8rem; opacity: 0.7; margin-top: 5px; }
        
        .card { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; 
            padding: 15px; 
            margin-bottom: 12px;
        }
        
        .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .form-row input { flex: 1; min-width: 150px; }
        
        input, select, textarea {
            padding: 10px 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.4); }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #e94560; }
        select option { background: #1a1a2e; }
        
        .btn { 
            padding: 10px 18px; 
            background: linear-gradient(90deg, #e94560, #ff6b6b); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 0.9rem; 
            cursor: pointer; 
            white-space: nowrap;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-success { background: linear-gradient(90deg, #00b894, #00cec9); }
        .btn-secondary { background: rgba(255,255,255,0.15); }
        .btn-danger { background: linear-gradient(90deg, #d63031, #e17055); }
        .btn-small { padding: 6px 12px; font-size: 0.8rem; }
        
        .book-item { 
            padding: 12px; 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px; 
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .book-item:hover { border-color: #e94560; background: rgba(233, 69, 96, 0.1); }
        .book-item.selected { border-color: #e94560; background: rgba(233, 69, 96, 0.2); }
        .book-item h3 { font-size: 0.95rem; margin-bottom: 4px; }
        .book-item .meta { color: rgba(255,255,255,0.6); font-size: 0.8rem; }
        .book-item .intro { color: rgba(255,255,255,0.5); font-size: 0.75rem; margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .progress { margin-top: 12px; }
        .progress-bar { height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #e94560, #ff6b6b); transition: width 0.3s; }
        .progress-text { text-align: center; color: rgba(255,255,255,0.8); font-size: 0.85rem; }
        
        .hidden { display: none !important; }
        
        .toast {
            position: fixed;
            bottom: 15px;
            right: 15px;
            padding: 10px 18px;
            background: rgba(0, 184, 148, 0.9);
            color: white;
            border-radius: 6px;
            transform: translateX(200%);
            transition: transform 0.3s;
            z-index: 1000;
            max-width: 300px;
            font-size: 0.85rem;
        }
        .toast.show { transform: translateX(0); }
        .toast.error { background: rgba(214, 48, 49, 0.9); }
        
        .tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
        .tab { 
            padding: 6px 14px; 
            background: rgba(255,255,255,0.1); 
            color: white; 
            border: none;
            border-radius: 15px; 
            cursor: pointer; 
            font-size: 0.85rem;
        }
        .tab.active { background: linear-gradient(90deg, #e94560, #ff6b6b); }
        
        .source-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 5px;
            margin-bottom: 5px;
            background: rgba(255,255,255,0.02);
            font-size: 0.85rem;
        }
        .source-item .name { font-weight: 500; }
        .source-item .url { font-size: 0.7rem; color: rgba(255,255,255,0.4); }
        .source-item.disabled { opacity: 0.5; }
        
        textarea {
            width: 100%;
            height: 80px;
            resize: vertical;
            font-family: monospace;
        }
        
        .stats { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
        .stat { text-align: center; padding: 8px 12px; background: rgba(233, 69, 96, 0.1); border-radius: 6px; border: 1px solid rgba(233, 69, 96, 0.2); }
        .stat .num { font-size: 1.3rem; font-weight: bold; color: #e94560; }
        .stat .label { font-size: 0.7rem; color: rgba(255,255,255,0.6); }
        
        .source-list { max-height: 250px; overflow-y: auto; margin-bottom: 10px; }
        
        .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
        
        .file-input-wrapper { position: relative; display: inline-block; }
        .file-input-wrapper input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        
        .history-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; margin-bottom: 6px;
        }
        .history-info h4 { font-size: 0.9rem; }
        .history-info p { font-size: 0.75rem; color: rgba(255,255,255,0.5); }
        
        .chapter-list { max-height: 300px; overflow-y: auto; }
        .chapter-item { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; }
        .chapter-item:hover { background: rgba(255,255,255,0.05); }
        .chapter-item input { width: 16px; height: 16px; }
        
        .loading { text-align: center; padding: 20px; color: rgba(255,255,255,0.5); }
        
        .log-panel {
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            padding: 10px;
            max-height: 120px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.75rem;
            margin-top: 10px;
        }
        .log-panel .log-item { margin-bottom: 2px; color: rgba(255,255,255,0.7); }
        .log-panel .log-error { color: #e94560; }
        .log-panel .log-success { color: #00b894; }
        
        .search-status {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .source-status {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            background: rgba(255,255,255,0.1);
        }
        .source-status.success { background: rgba(0, 184, 148, 0.3); }
        .source-status.error { background: rgba(214, 48, 49, 0.3); }
        .source-status.loading { background: rgba(255, 193, 7, 0.3); }
        
        .import-status {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
            font-size: 0.85rem;
        }
        
        .update-info {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0, 184, 148, 0.1);
            border-radius: 6px;
            font-size: 0.8rem;
            border: 1px solid rgba(0, 184, 148, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 小说下载器</h1>
            <p>Legado书源规则 | 每日自动更新书源</p>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('search')">🔍 搜索下载</button>
            <button class="tab" onclick="showTab('sources')">📚 书源管理</button>
            <button class="tab" onclick="showTab('history')">📁 历史</button>
        </div>
        
        <!-- 搜索页面 -->
        <div id="searchTab">
            <div class="card">
                <form class="form-row" id="searchForm">
                    <input type="text" id="searchInput" placeholder="输入小说名称..." required>
                    <select id="sourceSelect" style="min-width:120px">
                        <option value="">全部书源</option>
                    </select>
                    <button type="submit" class="btn" id="searchBtn">搜索</button>
                </form>
                <div class="search-status hidden" id="searchStatus"></div>
                <div class="update-info" id="updateInfo">正在加载书源...</div>
            </div>
            
            <div class="card hidden" id="resultsCard">
                <h3 style="margin-bottom:10px;font-size:0.95rem">搜索结果 <span id="resultCount" style="opacity:0.6"></span></h3>
                <div id="bookList"></div>
            </div>
            
            <div class="card hidden" id="bookInfoCard">
                <div id="bookInfo"></div>
                <div id="chapterListSection" class="hidden" style="margin-top:12px">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                        <h4 style="font-size:0.9rem">章节列表 <span id="chapterCount" style="opacity:0.6"></span></h4>
                        <div class="btn-group">
                            <button class="btn btn-small btn-secondary" onclick="selectAllChapters()">全选</button>
                            <button class="btn btn-small btn-secondary" onclick="deselectAllChapters()">取消</button>
                        </div>
                    </div>
                    <div class="chapter-list" id="chapterList"></div>
                </div>
                <div class="btn-group hidden" id="downloadActions" style="margin-top:12px">
                    <button class="btn" onclick="downloadSelected()">📥 下载选中</button>
                    <button class="btn btn-success" onclick="downloadAll()">📥 下载全部</button>
                </div>
            </div>
            
            <div class="card hidden" id="downloadCard">
                <div class="progress">
                    <div class="progress-bar"><div class="progress-fill" id="downloadProgressFill" style="width:0%"></div></div>
                    <div class="progress-text" id="downloadProgressText">准备中...</div>
                </div>
                <div class="log-panel" id="downloadLog"></div>
                <div class="btn-group hidden" id="saveActions" style="margin-top:12px">
                    <button class="btn btn-success" onclick="saveToFile()">💾 保存到本地</button>
                    <button class="btn" onclick="copyToClipboard()">📋 复制</button>
                </div>
            </div>
        </div>
        
        <!-- 书源管理页面 -->
        <div id="sourcesTab" class="hidden">
            <div class="card">
                <div class="stats">
                    <div class="stat">
                        <div class="num" id="sourceCount">0</div>
                        <div class="label">书源总数</div>
                    </div>
                    <div class="stat">
                        <div class="num" id="enabledCount">0</div>
                        <div class="label">已启用</div>
                    </div>
                </div>
                
                <h3 style="margin-bottom:8px;font-size:0.95rem">导入书源</h3>
                <textarea id="sourceInput" placeholder='粘贴Legado格式书源JSON...'></textarea>
                
                <div class="btn-group" style="margin-top:8px">
                    <button class="btn" onclick="importSources()">📥 导入JSON</button>
                    <button class="btn btn-secondary" onclick="loadOnlineSources()">🔄 更新书源</button>
                    <div class="file-input-wrapper">
                        <button class="btn btn-secondary">📁 选择文件</button>
                        <input type="file" accept=".json,.txt" onchange="importFromFile(event)">
                    </div>
                </div>
                
                <div class="import-status hidden" id="importStatus"></div>
                
                <h3 style="margin:12px 0 8px;font-size:0.95rem">当前书源</h3>
                <div class="source-list" id="sourceList">
                    <p class="loading">加载中...</p>
                </div>
                
                <div class="btn-group">
                    <button class="btn btn-secondary btn-small" onclick="exportSources()">📤 导出</button>
                    <button class="btn btn-danger btn-small" onclick="clearSources()">🗑️ 清空</button>
                </div>
            </div>
        </div>
        
        <!-- 历史页面 -->
        <div id="historyTab" class="hidden">
            <div class="card">
                <h3 style="margin-bottom:10px;font-size:0.95rem">下载历史</h3>
                <div id="historyList"></div>
                <button class="btn btn-secondary btn-small" onclick="clearHistory()" style="margin-top:10px">清空历史</button>
            </div>
        </div>
        
        <div style="text-align:center;color:rgba(255,255,255,0.4);margin-top:12px;font-size:0.75rem">
            每日自动更新书源 | 书源来源于网络仅供学习
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        // ========== 简单存储 ==========
        const Storage = {
            get(key, def = null) {
                try {
                    const v = localStorage.getItem(key);
                    return v ? JSON.parse(v) : def;
                } catch { return def; }
            },
            set(key, val) {
                try {
                    localStorage.setItem(key, JSON.stringify(val));
                    return true;
                } catch (e) {
                    console.warn('存储失败:', e);
                    return false;
                }
            },
            remove(key) {
                localStorage.removeItem(key);
            }
        };
        
        // ========== 内存缓存 ==========
        const Cache = {
            data: {},
            get(key) {
                const item = this.data[key];
                if (!item) return null;
                if (Date.now() - item.t > 3600000) {
                    delete this.data[key];
                    return null;
                }
                return item.v;
            },
            set(key, val) {
                this.data[key] = { v: val, t: Date.now() };
            }
        };
        
        // ========== Legado规则解析器 ==========
        class AnalyzeRule {
            constructor() { this.content = null; this.baseUrl = ''; }
            setContent(content, baseUrl = '') { this.content = content; this.baseUrl = baseUrl; return this; }
            
            getElements(rule) {
                if (!rule) return [];
                const rules = this.splitRule(rule);
                let currentList = [this.content].filter(c => c != null);
                for (const r of rules) {
                    if (!r) continue;
                    currentList = this.applyRuleForElements(r, currentList);
                    if (currentList.length === 0) break;
                }
                return currentList;
            }
            
            getString(rule) {
                if (!rule) return '';
                let processedRule = rule;
                const templatePattern = /\{\{\$?\.([^}]+)\}\}/g;
                let match;
                while ((match = templatePattern.exec(rule)) !== null) {
                    const templateVar = match[0];
                    const fieldName = match[1];
                    const value = this.getTemplateValue(fieldName);
                    processedRule = processedRule.replace(templateVar, value);
                }
                if (processedRule !== rule) return processedRule;
                
                const specialAttrs = ['text', 'text()', 'html', 'html()', 'ownText', 'href', 'src'];
                if (specialAttrs.includes(processedRule)) {
                    return this.applyRuleForString(processedRule, this.content) || '';
                }
                
                if (this.content && typeof this.content === 'object' && !Array.isArray(this.content)) {
                    const value = this.content[processedRule];
                    if (value != null) return Array.isArray(value) ? value[0]?.toString() || '' : value.toString();
                }
                
                if (!processedRule.includes('@') && !processedRule.includes('$') && !processedRule.includes('/') && !processedRule.includes('##')) {
                    return processedRule;
                }
                
                const rules = this.splitRule(processedRule);
                let currentValue = this.content;
                for (const r of rules) {
                    if (!r) continue;
                    currentValue = this.applyRuleForString(r, currentValue);
                    if (currentValue == null) break;
                }
                return (currentValue?.toString() || '').trim();
            }
            
            getTemplateValue(fieldName) {
                if (this.content && typeof this.content === 'object') return this.content[fieldName]?.toString() || '';
                return '';
            }
            
            splitRule(rule) {
                const result = [];
                let current = '';
                let i = 0;
                while (i < rule.length) {
                    if (i + 1 < rule.length && rule[i] === '@' && rule[i + 1] === '@') {
                        if (current) result.push(current);
                        current = '';
                        i += 2;
                    } else {
                        current += rule[i];
                        i++;
                    }
                }
                if (current) result.push(current);
                return result.filter(r => r.trim());
            }
            
            applyRuleForElements(rule, inputList) {
                const r = rule.trim();
                const results = [];
                for (const input of inputList) {
                    if (r.startsWith('@json:') || r.startsWith('$.')) {
                        results.push(...this.evalJsonPath(r.replace(/^@json:/, '').replace(/^\$/, ''), input));
                        continue;
                    }
                    if (r.startsWith('@regex:') || r.startsWith(':')) {
                        results.push(...this.evalRegexList(r.replace(/^@regex:/, '').replace(/^:/, ''), input));
                        continue;
                    }
                    if (r.startsWith('@css:')) {
                        results.push(...this.evalCss(r.replace(/^@css:/, ''), input));
                        continue;
                    }
                    results.push(...this.evalLegado(r, input));
                }
                return results;
            }
            
            applyRuleForString(rule, input) {
                if (input == null) return '';
                const r = rule.trim();
                
                if (r.startsWith('@json:') || r.startsWith('$.')) return this.evalJsonPathSingle(r.replace(/^@json:/, ''), input);
                if (r.startsWith('@regex:') || r.startsWith(':')) return this.evalRegexSingle(r.replace(/^@regex:/, '').replace(/^:/, ''), input);
                if (r.startsWith('@css:')) return this.evalCssSingle(r.replace(/^@css:/, ''), input);
                
                const specialAttrs = ['text', 'text()', 'html', 'html()', 'ownText', 'href', 'src', 'data-src', 'content', 'alt', 'title', 'value', 'name'];
                if (specialAttrs.includes(r.toLowerCase())) return this.getAttribute(input, r.toLowerCase());
                if ((r.match(/@/g) || []).length > 1) return this.applyMultiAtRule(r, input);
                
                const { selector, attr } = this.parseSelectorAndAttr(r);
                if (attr) return this.extractAttribute(selector, attr, input);
                return this.evalLegadoSingle(r, input);
            }
            
            parseSelectorAndAttr(rule) {
                const attrs = ['text', 'text()', 'html', 'html()', 'ownText', 'href', 'src', 'data-src', 'content', 'alt', 'title', 'value', 'name', 'onclick'];
                const lastAtIndex = rule.lastIndexOf('@');
                if (lastAtIndex > 0) {
                    const possibleAttr = rule.substring(lastAtIndex + 1).toLowerCase();
                    if (attrs.includes(possibleAttr) || possibleAttr.startsWith('data-')) {
                        return { selector: rule.substring(0, lastAtIndex), attr: possibleAttr };
                    }
                }
                return { selector: rule, attr: null };
            }
            
            applyMultiAtRule(rule, input) {
                const parts = rule.split('@');
                let current = input, currentElements = null;
                for (let i = 0; i < parts.length; i++) {
                    const part = parts[i].trim();
                    if (!part) continue;
                    const isLast = i === parts.length - 1;
                    const specialAttrs = ['text', 'text()', 'html', 'html()', 'ownText', 'href', 'src'];
                    if (isLast && specialAttrs.includes(part.toLowerCase())) {
                        const elements = currentElements || [current].filter(e => e != null);
                        return elements.map(el => this.getAttribute(el, part.toLowerCase())).filter(v => v).join('\n');
                    } else {
                        const elementsToProcess = currentElements || [current].filter(e => e != null);
                        const newElements = [];
                        for (const el of elementsToProcess) {
                            newElements.push(...this.selectElements(this.convertLegadoToSelector(part), el));
                        }
                        currentElements = newElements;
                        current = newElements[0];
                    }
                    if (!current && (!currentElements || currentElements.length === 0)) break;
                }
                return current?.toString() || '';
            }
            
            extractAttribute(selector, attr, input) {
                const elements = this.selectElements(this.convertLegadoToSelector(selector), input);
                for (const el of elements) {
                    const value = this.getAttribute(el, attr);
                    if (value) return value;
                }
                return '';
            }
            
            selectElements(selector, input) {
                if (!input) return [];
                if (Array.isArray(input)) return input;
                let element = input;
                if (typeof input === 'string') {
                    if (input.trim().startsWith('{') || input.trim().startsWith('[')) return [input];
                    element = new DOMParser().parseFromString(input, 'text/html');
                }
                const indexPattern = /^(.+?)(?::eq\((\d+)\)|\.(\d+)|\.(-\d+))$/;
                const match = selector.match(indexPattern);
                try {
                    if (match) {
                        const baseSelector = match[1];
                        const index = parseInt(match[2] || match[3] || match[4]);
                        const allElements = element.querySelectorAll ? Array.from(element.querySelectorAll(baseSelector)) : [];
                        if (index < 0) return allElements.length + index >= 0 ? [allElements[allElements.length + index]] : [];
                        return index < allElements.length ? [allElements[index]] : [];
                    }
                    return element.querySelectorAll ? Array.from(element.querySelectorAll(this.convertLegadoToSelector(selector))) : [];
                } catch (e) { return []; }
            }
            
            getAttribute(element, attr) {
                if (!element) return '';
                if (typeof element === 'string') return element;
                switch (attr.toLowerCase()) {
                    case 'text': case 'text()': return element.textContent || '';
                    case 'html': case 'html()': return element.innerHTML || '';
                    case 'ownText': return element.childNodes ? Array.from(element.childNodes).filter(n => n.nodeType === 3).map(n => n.textContent).join('') : '';
                    case 'href': return element.getAttribute?.('href') || '';
                    case 'src': return element.getAttribute?.('src') || '';
                    case 'data-src': return element.getAttribute?.('data-src') || '';
                    default: return element.getAttribute?.(attr) || '';
                }
            }
            
            convertLegadoToSelector(rule) {
                let sel = rule.trim();
                if (sel.includes('##')) sel = sel.split('##')[0];
                if (sel.includes('&&')) sel = sel.split('&&')[0];
                const attrNames = ['text', 'text()', 'html', 'html()', 'ownText', 'href', 'src', 'data-src', 'content', 'alt', 'title', 'value', 'name'];
                if (sel.includes('@')) {
                    const parts = sel.split('@');
                    if (parts.length === 2) {
                        const afterAt = parts[1].toLowerCase();
                        if (!attrNames.includes(afterAt) && !afterAt.startsWith('data-')) {
                            return parts[0] + ' ' + parts[1];
                        }
                    }
                }
                if (sel.startsWith('class.')) sel = '.' + sel.substring(6);
                if (sel.startsWith('id.')) sel = '#' + sel.substring(3);
                if (sel.startsWith('tag.')) sel = sel.substring(4);
                sel = sel.replace(/\.(\d+)$/g, ':eq($1)');
                sel = sel.replace(/\.(-\d+)$/g, ':eq($1)');
                return sel;
            }
            
            evalLegado(rule, input) {
                const results = [];
                const selector = this.convertLegadoToSelector(rule);
                try {
                    if (typeof input === 'string') {
                        if (input.trim().startsWith('{') || input.trim().startsWith('[')) {
                            try {
                                const json = JSON.parse(input);
                                const jsonResult = this.getJsonValue(json, rule);
                                if (Array.isArray(jsonResult)) results.push(...jsonResult);
                                else if (jsonResult != null) results.push(jsonResult);
                            } catch (e) {}
                        } else {
                            const doc = new DOMParser().parseFromString(input, 'text/html');
                            results.push(...Array.from(doc.querySelectorAll(selector)));
                        }
                    } else if (input?.querySelectorAll) {
                        results.push(...Array.from(input.querySelectorAll(selector)));
                    } else if (typeof input === 'object') {
                        const jsonResult = this.getJsonValue(input, rule);
                        if (Array.isArray(jsonResult)) results.push(...jsonResult);
                        else if (jsonResult != null) results.push(jsonResult);
                    }
                } catch (e) {}
                return results;
            }
            
            evalLegadoSingle(rule, input) {
                const parts = rule.split('##');
                let selector = parts[0];
                const replaceRegex = parts[1];
                const replacement = parts[2] || '';
                let attr = null;
                if (selector.includes('@')) {
                    const attrParts = selector.split('@');
                    if (attrParts.length === 2) { selector = attrParts[0]; attr = attrParts[1]; }
                }
                const cssSelector = this.convertLegadoToSelector(selector);
                let result = '';
                try {
                    if (typeof input === 'string') {
                        if (input.trim().startsWith('{') || input.trim().startsWith('[')) {
                            try {
                                const json = JSON.parse(input);
                                result = this.getJsonValue(json, selector)?.toString() || '';
                            } catch (e) {
                                const doc = new DOMParser().parseFromString(input, 'text/html');
                                const el = cssSelector ? doc.querySelector(cssSelector) : doc.body;
                                result = el ? (attr ? this.getAttribute(el, attr) : el.textContent) : '';
                            }
                        } else {
                            const doc = new DOMParser().parseFromString(input, 'text/html');
                            const el = cssSelector ? doc.querySelector(cssSelector) : doc.body;
                            result = el ? (attr ? this.getAttribute(el, attr) : el.textContent) : '';
                        }
                    } else if (input?.querySelector) {
                        const el = cssSelector ? input.querySelector(cssSelector) : input;
                        result = el ? (attr ? this.getAttribute(el, attr) : el.textContent) : '';
                    } else if (typeof input === 'object') {
                        result = this.getJsonValue(input, selector)?.toString() || '';
                    }
                } catch (e) {}
                if (replaceRegex) {
                    try { result = result.replace(new RegExp(replaceRegex, 'g'), replacement); } catch (e) {}
                }
                return result.trim();
            }
            
            getJsonValue(json, path) {
                if (!path || path === '.') return json;
                const keys = path.replace(/^\$?\.?/, '').split('.');
                let current = json;
                for (const key of keys) {
                    if (current == null) return null;
                    const arrayMatch = key.match(/^(\w+)\[(\d+)\]$/);
                    if (arrayMatch) {
                        const arrKey = arrayMatch[1];
                        const index = parseInt(arrayMatch[2]);
                        current = current[arrKey];
                        if (Array.isArray(current)) current = current[index];
                    } else if (Array.isArray(current)) {
                        current = current.map(item => item?.[key]);
                    } else {
                        current = current?.[key];
                    }
                }
                return current;
            }
            
            evalJsonPath(path, input) {
                const results = [];
                try {
                    const json = typeof input === 'string' ? JSON.parse(input) : input;
                    const value = this.getJsonValue(json, path);
                    if (Array.isArray(value)) results.push(...value);
                    else if (value != null) results.push(value);
                } catch (e) {}
                return results;
            }
            
            evalJsonPathSingle(path, input) {
                try {
                    const json = typeof input === 'string' ? JSON.parse(input) : input;
                    return this.getJsonValue(json, path)?.toString() || '';
                } catch (e) { return ''; }
            }
            
            evalCss(css, input) {
                const results = [];
                try {
                    if (typeof input === 'string') {
                        const doc = new DOMParser().parseFromString(input, 'text/html');
                        results.push(...Array.from(doc.querySelectorAll(css)));
                    } else if (input?.querySelectorAll) {
                        results.push(...Array.from(input.querySelectorAll(css)));
                    }
                } catch (e) {}
                return results;
            }
            
            evalCssSingle(css, input) {
                try {
                    if (typeof input === 'string') {
                        const doc = new DOMParser().parseFromString(input, 'text/html');
                        return doc.querySelector(css)?.textContent || '';
                    } else if (input?.querySelector) {
                        return input.querySelector(css)?.textContent || '';
                    }
                } catch (e) {}
                return '';
            }
            
            evalRegexList(regex, input) {
                try {
                    const p = new RegExp(regex);
                    const m = p.exec(input?.toString() || '');
                    if (m) return m.slice(1).filter(g => g != null);
                } catch (e) {}
                return [];
            }
            
            evalRegexSingle(regex, input) {
                try {
                    const m = new RegExp(regex).exec(input?.toString() || '');
                    if (m) return m[1] || m[0] || '';
                } catch (e) {}
                return '';
            }
        }
        
        // ========== HTTP请求 ==========
        async function fetchHtml(url) {
            const cached = Cache.get(url);
            if (cached) return { content: cached, success: true, url, fromCache: true };
            
            const proxies = [
                `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
                `https://corsproxy.io/?${encodeURIComponent(url)}`
            ];
            
            for (const proxyUrl of proxies) {
                try {
                    const response = await fetch(proxyUrl, { signal: AbortSignal.timeout(15000) });
                    const data = await response.json();
                    if (data.contents || data) {
                        const content = data.contents || (typeof data === 'string' ? data : JSON.stringify(data));
                        Cache.set(url, content);
                        return { content, success: true, url, fromCache: false };
                    }
                } catch (e) { continue; }
            }
            
            return { content: '', success: false, error: '请求失败', url };
        }

                const sources = Array.isArray(data) ? data : [data];

                sources.forEach(s => {
                    if (!s.bookSourceName || !s.bookSourceUrl) return;
                    const existingIndex = bookSources.findIndex(existing => existing.bookSourceUrl === s.bookSourceUrl);
                    if (existingIndex >= 0) {
                        bookSources[existingIndex] = { ...bookSources[existingIndex], ...s, enabled: true };
                        updated++;

                        added++;

                Storage.set('bookSources', bookSources);
                updateSourceCount();
                updateSourceSelect();
                renderSourceList();
                document.getElementById('sourceInput').value = '';
                showToast(`成功导入 ${added} 个，更新 ${updated} 个书源`);

        async function searchSource(source, keyword) {
            const statusId = `status-${source.bookSourceName.replace(/[^a-zA-Z0-9]/g, '_')}`;
            const statusEl = document.getElementById(statusId);
            
            try {
                statusEl.className = 'source-status loading';
                statusEl.textContent = `${source.bookSourceName}: 搜索中...`;
                
                const searchUrl = (source.searchUrl || '').replace('{{key}}', encodeURIComponent(keyword)).replace('{{page}}', '1');
                const fullUrl = searchUrl.startsWith('http') ? searchUrl : source.bookSourceUrl + searchUrl;
                
                const result = await fetchHtml(fullUrl);
                
                if (!result.success) {
                    statusEl.className = 'source-status error';
                    statusEl.textContent = `${source.bookSourceName}: 请求失败`;
                    return [];
                }
                
                const rule = source.ruleSearch || {};
                const parser = new AnalyzeRule().setContent(result.content, result.url);
                const items = parser.getElements(rule.bookList);
                
                const books = items.map(item => {
                    const r = new AnalyzeRule().setContent(item, result.url);
                    const name = r.getString(rule.name);
                    if (!name) return null;
                    
                    let bookUrl = r.getString(rule.bookUrl);
                    if (bookUrl && !bookUrl.startsWith('http')) {
                        bookUrl = resolveUrl(source.bookSourceUrl, bookUrl);
                    }
                    
                    return {
                        name,
                        author: r.getString(rule.author),
                        bookUrl,
                        intro: r.getString(rule.intro),
                        kind: r.getString(rule.kind),
                        lastChapter: r.getString(rule.lastChapter),
                        sourceName: source.bookSourceName,
                        sourceUrl: source.bookSourceUrl,
                        source
                    };
                }).filter(b => b && b.name && b.bookUrl);
                
                statusEl.className = 'source-status success';
                statusEl.textContent = `${source.bookSourceName}: ${books.length}个${result.fromCache ? '(缓存)' : ''}`;
                return books;
            } catch (err) {
                statusEl.className = 'source-status error';
                statusEl.textContent = `${source.bookSourceName}: ${err.message}`;
                return [];
            }
        }
        
        function resolveUrl(base, relative) {
            if (!relative) return '';
            if (relative.startsWith('http')) return relative;
            if (relative.startsWith('//')) return 'https:' + relative;
            if (relative.startsWith('/')) {
                try { return new URL(base).origin + relative; } catch (e) { return relative; }
            }
            try { return new URL(relative, base).href; } catch (e) { return relative; }
        }

        async function downloadChapters(chaptersToDownload) {
            document.getElementById('downloadCard').classList.remove('hidden');
            document.getElementById('downloadProgressFill').style.width = '0%';
            document.getElementById('downloadProgressText').textContent = '准备下载...';
            document.getElementById('saveActions').classList.add('hidden');
            document.getElementById('downloadLog').innerHTML = '';
            downloadedContent = '';
            
            const contentRule = selectedSource.ruleContent?.content || '#content';
            downloadedContent = `书名: ${selectedBook.name}\n作者: ${selectedBook.author || '未知'}\n来源: ${selectedBook.sourceName}\n下载时间: ${new Date().toLocaleString()}\n\n${'='.repeat(50)}\n\n`;
            
            let success = 0, fail = 0;
            const logPanel = document.getElementById('downloadLog');
            
            for (let i = 0; i < chaptersToDownload.length; i++) {
                const ch = chaptersToDownload[i];
                
                try {
                    document.getElementById('downloadProgressText').textContent = `下载中: ${ch.name} (${i + 1}/${chaptersToDownload.length})`;
                    
                    const result = await fetchHtml(ch.url);
                    
                    if (result.success) {
                        const parser = new AnalyzeRule().setContent(result.content, result.url);
                        let content = parser.getString(contentRule);
                        
                        if (content) {
                            content = content.replace(/&nbsp;/g, ' ').replace(/<br\s*\/?>/gi, '\n').replace(/<[^>]+>/g, '').trim();
                            downloadedContent += `第${i + 1}章 ${ch.name}\n\n${content}\n\n`;
                            success++;
                            logPanel.innerHTML += `<div class="log-item log-success">✓ ${ch.name}${result.fromCache ? '(缓存)' : ''}</div>`;
                        } else {
                            fail++;
                            logPanel.innerHTML += `<div class="log-item log-error">✗ ${ch.name}: 内容为空</div>`;
                        }
                    } else {
                        fail++;
                        logPanel.innerHTML += `<div class="log-item log-error">✗ ${ch.name}: 请求失败</div>`;
                    }
                } catch (e) {
                    fail++;
                    logPanel.innerHTML += `<div class="log-item log-error">✗ ${ch.name}: ${e.message}</div>`;
                }
                
                document.getElementById('downloadProgressFill').style.width = Math.round((i + 1) / chaptersToDownload.length * 100) + '%';
                logPanel.scrollTop = logPanel.scrollHeight;
                
                await new Promise(r => setTimeout(r, 200));
            }
            
            document.getElementById('downloadProgressText').textContent = `下载完成！成功: ${success}, 失败: ${fail}`;
            document.getElementById('saveActions').classList.remove('hidden');
            
            saveToHistory();
            showToast('下载完成！');
        }
        
        function saveToFile() {
            if (!downloadedContent) return showToast('没有内容', true);
            const blob = new Blob([downloadedContent], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${selectedBook.name}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('文件已保存！');
        }
        
        async function copyToClipboard() {
            if (!downloadedContent) return showToast('没有内容', true);
            try {
                await navigator.clipboard.writeText(downloadedContent.substring(0, 500000));
                showToast('已复制！');
            } catch (e) {
                showToast('复制失败', true);
            }
        }
        
        // ========== 历史 ==========
        
        function saveToHistory() {
            const item = {
                id: Date.now(),
                name: selectedBook.name,
                author: selectedBook.author,
                source: selectedBook.sourceName,
                content: downloadedContent.substring(0, 100000),
                date: new Date().toLocaleString(),
                size: (downloadedContent.length / 1024).toFixed(1) + ' KB'
            };
            downloadHistory.unshift(item);
            if (downloadHistory.length > 10) downloadHistory = downloadHistory.slice(0, 10);
            Storage.set('downloadHistory', downloadHistory);
        }
        
        function renderHistory() {
            const list = document.getElementById('historyList');
            if (!downloadHistory.length) {
                list.innerHTML = '<p class="loading">暂无记录</p>';
                return;
            }
            list.innerHTML = downloadHistory.map(item => `
                <div class="history-item">
                    <div class="history-info">
                        <h4>《${item.name}》</h4>
                        <p>${item.author || ''} | ${item.size} | ${item.date}</p>
                    </div>
                    <button class="btn btn-small" onclick="downloadHistoryItem(${item.id})">保存</button>
                </div>
            `).join('');
        }
        
        function downloadHistoryItem(id) {
            const item = downloadHistory.find(h => h.id === id);
            if (item) {
                const blob = new Blob([item.content], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${item.name}.txt`;
                a.click();
                URL.revokeObjectURL(url);
            }
        }
        
        function clearHistory() {
            downloadHistory = [];
            Storage.set('downloadHistory', []);
            renderHistory();
            showToast('已清空');
        }
        
        // 启动
        init();
    </script>
</body>
</html>
