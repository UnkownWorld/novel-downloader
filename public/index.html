<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说下载器 - 基于Legado书源</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { 
            font-size: 2.5rem; 
            margin-bottom: 10px; 
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p { font-size: 1.1rem; opacity: 0.8; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
        .tab { 
            padding: 12px 30px; 
            background: rgba(255,255,255,0.1); 
            color: white; 
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px; 
            cursor: pointer; 
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        .tab:hover { background: rgba(255,255,255,0.2); }
        .tab.active { background: linear-gradient(90deg, #e94560, #ff6b6b); border-color: transparent; }
        
        .card { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; 
            padding: 30px; 
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        
        .search-form { display: flex; gap: 15px; flex-wrap: wrap; }
        .search-input { 
            flex: 1; 
            min-width: 200px; 
            padding: 15px 20px; 
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 10px; 
            font-size: 1rem; 
        }
        .search-input::placeholder { color: rgba(255,255,255,0.5); }
        .search-input:focus { outline: none; border-color: #e94560; }
        
        .btn { 
            padding: 15px 40px; 
            background: linear-gradient(90deg, #e94560, #ff6b6b); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 1rem; 
            cursor: pointer; 
            transition: all 0.3s;
            font-weight: 500;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-secondary { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); box-shadow: none; }
        .btn-success { background: linear-gradient(90deg, #00b894, #00cec9); }
        .btn-danger { background: linear-gradient(90deg, #d63031, #e17055); }
        
        .options { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
        .option-group { display: flex; align-items: center; gap: 10px; }
        .option-group label { font-weight: 500; opacity: 0.9; }
        .option-group input, .option-group select { 
            padding: 10px 15px; 
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 8px;
        }
        .option-group select option { background: #1a1a2e; color: white; }
        
        .book-list { display: grid; gap: 15px; max-height: 500px; overflow-y: auto; padding-right: 10px; }
        .book-list::-webkit-scrollbar { width: 6px; }
        .book-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 3px; }
        .book-list::-webkit-scrollbar-thumb { background: #e94560; border-radius: 3px; }
        
        .book-item { 
            display: flex; 
            gap: 15px; 
            padding: 20px; 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; 
            cursor: pointer; 
            transition: all 0.3s;
            background: rgba(255,255,255,0.02);
        }
        .book-item:hover { border-color: #e94560; background: rgba(233, 69, 96, 0.1); }
        .book-item.selected { border-color: #e94560; background: rgba(233, 69, 96, 0.15); }
        .book-cover { width: 80px; height: 110px; background: rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; flex-shrink: 0; }
        .book-cover img { width: 100%; height: 100%; object-fit: cover; }
        .book-info { flex: 1; }
        .book-info h3 { font-size: 1.1rem; margin-bottom: 5px; color: #fff; }
        .book-info .author { color: rgba(255,255,255,0.7); font-size: 0.9rem; margin-bottom: 5px; }
        .book-info .source { color: rgba(255,255,255,0.5); font-size: 0.8rem; margin-bottom: 8px; }
        .book-info .intro { color: rgba(255,255,255,0.6); font-size: 0.85rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .progress { margin-top: 20px; }
        .progress-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin-bottom: 15px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #e94560, #ff6b6b); transition: width 0.3s; border-radius: 4px; }
        .progress-text { text-align: center; color: rgba(255,255,255,0.8); }
        
        .download-actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .download-actions .btn { flex: 1; min-width: 150px; }
        
        .hidden { display: none !important; }
        
        /* 书源管理 */
        .source-list { max-height: 400px; overflow-y: auto; }
        .source-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .source-item:last-child { border-bottom: none; }
        .source-info { flex: 1; }
        .source-info h4 { font-size: 0.95rem; margin-bottom: 3px; }
        .source-info p { font-size: 0.8rem; color: rgba(255,255,255,0.5); }
        
        .import-area { margin-top: 20px; }
        .import-area textarea { 
            width: 100%; 
            height: 150px; 
            padding: 15px; 
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            border-radius: 10px; 
            font-family: monospace; 
            font-size: 0.9rem; 
            resize: vertical; 
        }
        .import-area textarea::placeholder { color: rgba(255,255,255,0.3); }
        
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-item { text-align: center; padding: 20px; background: rgba(233, 69, 96, 0.1); border-radius: 15px; border: 1px solid rgba(233, 69, 96, 0.2); }
        .stat-item .number { font-size: 2rem; font-weight: bold; background: linear-gradient(90deg, #e94560, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .stat-item .label { color: rgba(255,255,255,0.7); font-size: 0.9rem; }
        
        /* 下载历史 */
        .history-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px; 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.02);
        }
        .history-info h4 { font-size: 1rem; margin-bottom: 3px; }
        .history-info p { font-size: 0.8rem; color: rgba(255,255,255,0.5); }
        
        /* Toast通知 */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            background: rgba(0, 184, 148, 0.9);
            color: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transform: translateX(200%);
            transition: transform 0.3s;
            z-index: 1000;
        }
        .toast.show { transform: translateX(0); }
        .toast.error { background: rgba(214, 48, 49, 0.9); }
        
        /* 加载动画 */
        .loading { display: flex; justify-content: center; padding: 40px; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #e94560; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 文件预览 */
        .preview-section { margin-top: 20px; }
        .preview-content { 
            max-height: 300px; 
            overflow-y: auto; 
            padding: 15px; 
            background: rgba(0,0,0,0.3); 
            border-radius: 10px; 
            font-family: monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .search-form { flex-direction: column; }
            .btn { width: 100%; }
            .book-item { flex-direction: column; }
            .book-cover { width: 100%; height: 150px; }
            .download-actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 小说下载器</h1>
            <p>基于Legado书源，支持多源搜索下载，可保存到本地</p>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('search')">🔍 搜索下载</button>
            <button class="tab" onclick="showTab('sources')">📚 书源管理</button>
            <button class="tab" onclick="showTab('history')">📁 下载历史</button>
        </div>
        
        <!-- 搜索页面 -->
        <div id="searchTab">
            <div class="card">
                <form class="search-form" id="searchForm">
                    <input type="text" class="search-input" id="searchInput" placeholder="输入小说名称或作者..." required>
                    <button type="submit" class="btn" id="searchBtn">🔍 搜索</button>
                </form>
                <div class="options">
                    <div class="option-group">
                        <label>下载章数:</label>
                        <select id="chapterLimit">
                            <option value="50">前50章</option>
                            <option value="100" selected>前100章</option>
                            <option value="200">前200章</option>
                            <option value="500">前500章</option>
                            <option value="0">全部章节</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="card hidden" id="resultsCard">
                <h2 style="margin-bottom:20px">搜索结果 <span id="resultCount" style="background:linear-gradient(90deg,#e94560,#ff6b6b);padding:2px 12px;border-radius:20px;font-size:0.8rem">0</span></h2>
                <div class="book-list" id="bookList"></div>
            </div>
            
            <div class="card hidden" id="downloadCard">
                <div id="downloadInfo"></div>
                <div class="progress hidden" id="progressSection">
                    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
                    <div class="progress-text" id="progressText">准备下载...</div>
                </div>
                <div class="download-actions">
                    <button class="btn" id="downloadBtn">📥 开始下载</button>
                </div>
                <div class="preview-section hidden" id="previewSection">
                    <h3 style="margin-bottom:10px">📖 内容预览</h3>
                    <div class="preview-content" id="previewContent"></div>
                </div>
                <div class="download-actions hidden" id="saveActions">
                    <button class="btn btn-success" onclick="saveToFile()">💾 保存到本地</button>
                    <button class="btn btn-secondary" onclick="copyToClipboard()">📋 复制内容</button>
                </div>
            </div>
        </div>
        
        <!-- 书源管理页面 -->
        <div id="sourcesTab" class="hidden">
            <div class="card">
                <div class="stats">
                    <div class="stat-item">
                        <div class="number" id="sourceCount">0</div>
                        <div class="label">书源数量</div>
                    </div>
                </div>
                
                <h3 style="margin-bottom:15px">导入书源</h3>
                <div class="import-area">
                    <textarea id="sourceInput" placeholder="粘贴Legado书源JSON数组...&#10;支持单个书源或书源数组&#10;&#10;示例:&#10;[{&#10;  &quot;bookSourceName&quot;: &quot;笔趣阁&quot;,&#10;  &quot;bookSourceUrl&quot;: &quot;https://www.biquge.com&quot;,&#10;  &quot;searchUrl&quot;: &quot;https://www.biquge.com/search.php?keyword={{key}}&quot;&#10;}]"></textarea>
                    <div style="display:flex;gap:10px;margin-top:10px;flex-wrap:wrap">
                        <button class="btn" onclick="importSources()">📥 导入书源</button>
                        <button class="btn btn-secondary" onclick="loadFromUrl()">🌐 从URL导入</button>
                    </div>
                </div>
                
                <h3 style="margin:20px 0 15px">当前书源</h3>
                <div class="source-list" id="sourceList">
                    <p style="text-align:center;color:rgba(255,255,255,0.5);padding:20px">加载中...</p>
                </div>
                
                <div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap">
                    <button class="btn btn-success" onclick="loadDefaultSources()">📦 加载默认书源</button>
                    <button class="btn btn-secondary" onclick="exportSources()">📤 导出书源</button>
                    <button class="btn btn-danger" onclick="clearSources()">🗑️ 清空书源</button>
                </div>
            </div>
        </div>
        
        <!-- 下载历史页面 -->
        <div id="historyTab" class="hidden">
            <div class="card">
                <h2 style="margin-bottom:20px">📁 下载历史</h2>
                <div id="historyList">
                    <p style="text-align:center;color:rgba(255,255,255,0.5);padding:40px">暂无下载记录</p>
                </div>
                <div style="margin-top:20px">
                    <button class="btn btn-danger" onclick="clearHistory()">🗑️ 清空历史</button>
                </div>
            </div>
        </div>
        
        <div style="text-align:center;color:rgba(255,255,255,0.5);margin-top:30px">
            <p>基于 <a href="https://github.com/gedoor/legado" target="_blank" style="color:#e94560">Legado</a> 开源项目 | 书源来源于网络，仅供学习交流</p>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        const API = window.location.origin;
        let searchResults = [];
        let selectedBook = null;
        let downloadedContent = '';
        let downloadHistory = JSON.parse(localStorage.getItem('downloadHistory') || '[]');
        
        // Toast通知
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // 标签切换
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('searchTab').classList.toggle('hidden', tab !== 'search');
            document.getElementById('sourcesTab').classList.toggle('hidden', tab !== 'sources');
            document.getElementById('historyTab').classList.toggle('hidden', tab !== 'history');
            if (tab === 'sources') loadSources();
            if (tab === 'history') renderHistory();
        }
        
        // 搜索
        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) return;
            
            const btn = document.getElementById('searchBtn');
            btn.disabled = true;
            btn.textContent = '搜索中...';
            
            try {
                const res = await fetch(`${API}/api/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keyword })
                });
                const data = await res.json();
                
                if (data.success) {
                    searchResults = data.results;
                    displayResults(data.results);
                    showToast(`找到 ${data.results.length} 个结果`);
                } else {
                    showToast('搜索失败: ' + data.error, true);
                }
            } catch (err) {
                showToast('搜索失败: ' + err.message, true);
            } finally {
                btn.disabled = false;
                btn.textContent = '🔍 搜索';
            }
        });
        
        function displayResults(results) {
            const list = document.getElementById('bookList');
            document.getElementById('resultCount').textContent = results.length;
            
            if (!results.length) {
                list.innerHTML = '<p style="text-align:center;color:rgba(255,255,255,0.5);padding:40px">未找到相关小说</p>';
            } else {
                list.innerHTML = results.map((book, i) => `
                    <div class="book-item" onclick="selectBook(${i})">
                        <div class="book-cover">
                            <img src="${book.coverUrl || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 140%22><rect fill=%22%23333%22 width=%22100%22 height=%22140%22/><text x=%2250%22 y=%2270%22 text-anchor=%22middle%22 fill=%22%23666%22 font-size=%2212%22>暂无封面</text></svg>'}" alt="${book.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 140%22><rect fill=%22%23333%22 width=%22100%22 height=%22140%22/><text x=%2250%22 y=%2270%22 text-anchor=%22middle%22 fill=%22%23666%22 font-size=%2212%22>暂无封面</text></svg>'">
                        </div>
                        <div class="book-info">
                            <h3>${book.name}</h3>
                            <div class="author">作者: ${book.author || '未知'}</div>
                            <div class="source">来源: ${book.sourceName}</div>
                            <div class="intro">${book.intro || '暂无简介'}</div>
                        </div>
                    </div>
                `).join('');
            }
            
            document.getElementById('resultsCard').classList.remove('hidden');
            document.getElementById('downloadCard').classList.add('hidden');
        }
        
        function selectBook(index) {
            document.querySelectorAll('.book-item').forEach((item, i) => {
                item.classList.toggle('selected', i === index);
            });
            selectedBook = searchResults[index];
            
            document.getElementById('downloadInfo').innerHTML = `
                <h3 style="font-size:1.3rem;margin-bottom:10px">《${selectedBook.name}》</h3>
                <p style="color:rgba(255,255,255,0.7);margin-bottom:5px">作者: ${selectedBook.author || '未知'}</p>
                <p style="color:rgba(255,255,255,0.5)">来源: ${selectedBook.sourceName}</p>
            `;
            document.getElementById('downloadCard').classList.remove('hidden');
            document.getElementById('progressSection').classList.add('hidden');
            document.getElementById('previewSection').classList.add('hidden');
            document.getElementById('saveActions').classList.add('hidden');
            document.getElementById('downloadBtn').disabled = false;
            document.getElementById('downloadBtn').textContent = '📥 开始下载';
            downloadedContent = '';
        }
        
        // 下载
        document.getElementById('downloadBtn').addEventListener('click', async () => {
            if (!selectedBook) return;
            
            const btn = document.getElementById('downloadBtn');
            btn.disabled = true;
            btn.textContent = '下载中...';
            document.getElementById('progressSection').classList.remove('hidden');
            document.getElementById('saveActions').classList.add('hidden');
            downloadedContent = '';
            
            try {
                const res = await fetch(`${API}/api/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        book: selectedBook,
                        chapterLimit: parseInt(document.getElementById('chapterLimit').value)
                    })
                });
                
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.progress) {
                                    document.getElementById('progressFill').style.width = data.progress + '%';
                                }
                                if (data.text) {
                                    document.getElementById('progressText').textContent = data.text;
                                }
                                if (data.content) {
                                    downloadedContent += data.content;
                                }
                                if (data.done) {
                                    btn.textContent = '✅ 下载完成';
                                    document.getElementById('progressText').textContent = '下载完成！可以保存到本地';
                                    
                                    // 显示预览
                                    if (downloadedContent) {
                                        document.getElementById('previewContent').textContent = downloadedContent.substring(0, 2000) + (downloadedContent.length > 2000 ? '\n\n...(更多内容)' : '');
                                        document.getElementById('previewSection').classList.remove('hidden');
                                    }
                                    
                                    document.getElementById('saveActions').classList.remove('hidden');
                                    
                                    // 保存到历史
                                    saveToHistory(selectedBook, downloadedContent);
                                    
                                    showToast('下载完成！点击"保存到本地"按钮保存文件');
                                }
                                if (data.error) {
                                    document.getElementById('progressText').textContent = '错误: ' + data.error;
                                    btn.disabled = false;
                                    btn.textContent = '📥 重试下载';
                                    showToast('下载失败: ' + data.error, true);
                                }
                            } catch (e) {}
                        }
                    }
                }
            } catch (err) {
                showToast('下载失败: ' + err.message, true);
                btn.disabled = false;
                btn.textContent = '📥 开始下载';
            }
        });
        
        // 保存到本地文件
        function saveToFile() {
            if (!downloadedContent) {
                showToast('没有可保存的内容', true);
                return;
            }
            
            const filename = `${selectedBook.name}_${selectedBook.author || '未知'}.txt`;
            const blob = new Blob([downloadedContent], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast(`已保存: ${filename}`);
        }
        
        // 复制到剪贴板
        async function copyToClipboard() {
            if (!downloadedContent) {
                showToast('没有可复制的内容', true);
                return;
            }
            
            try {
                await navigator.clipboard.writeText(downloadedContent);
                showToast('已复制到剪贴板');
            } catch (err) {
                // 降级方案
                const textarea = document.createElement('textarea');
                textarea.value = downloadedContent;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('已复制到剪贴板');
            }
        }
        
        // 保存到历史记录
        function saveToHistory(book, content) {
            const history = {
                id: Date.now(),
                name: book.name,
                author: book.author,
                sourceName: book.sourceName,
                content: content,
                date: new Date().toLocaleString(),
                size: (content.length / 1024).toFixed(1) + ' KB'
            };
            
            downloadHistory.unshift(history);
            // 只保留最近20条
            if (downloadHistory.length > 20) {
                downloadHistory = downloadHistory.slice(0, 20);
            }
            localStorage.setItem('downloadHistory', JSON.stringify(downloadHistory));
        }
        
        // 渲染历史记录
        function renderHistory() {
            const list = document.getElementById('historyList');
            
            if (!downloadHistory.length) {
                list.innerHTML = '<p style="text-align:center;color:rgba(255,255,255,0.5);padding:40px">暂无下载记录</p>';
                return;
            }
            
            list.innerHTML = downloadHistory.map(item => `
                <div class="history-item">
                    <div class="history-info">
                        <h4>《${item.name}》</h4>
                        <p>作者: ${item.author || '未知'} | ${item.sourceName} | ${item.size} | ${item.date}</p>
                    </div>
                    <div style="display:flex;gap:10px">
                        <button class="btn btn-secondary" style="padding:8px 15px;font-size:0.85rem" onclick="downloadFromHistory(${item.id})">💾 保存</button>
                        <button class="btn btn-danger" style="padding:8px 15px;font-size:0.85rem" onclick="deleteFromHistory(${item.id})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }
        
        // 从历史下载
        function downloadFromHistory(id) {
            const item = downloadHistory.find(h => h.id === id);
            if (item && item.content) {
                const blob = new Blob([item.content], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${item.name}_${item.author || '未知'}.txt`;
                a.click();
                URL.revokeObjectURL(url);
                showToast('已保存文件');
            }
        }
        
        // 删除历史
        function deleteFromHistory(id) {
            downloadHistory = downloadHistory.filter(h => h.id !== id);
            localStorage.setItem('downloadHistory', JSON.stringify(downloadHistory));
            renderHistory();
            showToast('已删除');
        }
        
        // 清空历史
        function clearHistory() {
            if (!confirm('确定要清空所有下载历史吗？')) return;
            downloadHistory = [];
            localStorage.setItem('downloadHistory', JSON.stringify(downloadHistory));
            renderHistory();
            showToast('历史已清空');
        }
        
        // 书源管理
        async function loadSources() {
            try {
                const res = await fetch(`${API}/api/sources`);
                const data = await res.json();
                document.getElementById('sourceCount').textContent = data.total || 0;
                
                const list = document.getElementById('sourceList');
                if (data.sources && data.sources.length) {
                    list.innerHTML = data.sources.map(s => `
                        <div class="source-item">
                            <div class="source-info">
                                <h4>${s.bookSourceName}</h4>
                                <p>${s.bookSourceUrl}</p>
                            </div>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = '<p style="text-align:center;color:rgba(255,255,255,0.5);padding:20px">暂无书源，请导入</p>';
                }
            } catch (err) {
                document.getElementById('sourceList').innerHTML = '<p style="text-align:center;color:rgba(255,255,255,0.5);padding:20px">加载失败</p>';
            }
        }
        
        async function importSources() {
            const input = document.getElementById('sourceInput').value.trim();
            if (!input) {
                showToast('请输入书源JSON', true);
                return;
            }
            
            try {
                const sources = JSON.parse(input);
                const res = await fetch(`${API}/api/sources`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(Array.isArray(sources) ? sources : [sources])
                });
                const data = await res.json();
                if (data.success) {
                    showToast(data.message);
                    loadSources();
                    document.getElementById('sourceInput').value = '';
                } else {
                    showToast('导入失败: ' + data.error, true);
                }
            } catch (err) {
                showToast('JSON格式错误: ' + err.message, true);
            }
        }
        
        async function loadFromUrl() {
            const url = prompt('请输入书源JSON的URL:');
            if (!url) return;
            
            try {
                const res = await fetch(url);
                const sources = await res.json();
                const importRes = await fetch(`${API}/api/sources`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(Array.isArray(sources) ? sources : [sources])
                });
                const data = await importRes.json();
                if (data.success) {
                    showToast(data.message);
                    loadSources();
                } else {
                    showToast('导入失败: ' + data.error, true);
                }
            } catch (err) {
                showToast('导入失败: ' + err.message, true);
            }
        }
        
        async function exportSources() {
            try {
                const res = await fetch(`${API}/api/sources`);
                const data = await res.json();
                if (data.sources) {
                    const json = JSON.stringify(data.sources, null, 2);
                    const blob = new Blob([json], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'book_sources.json';
                    a.click();
                    URL.revokeObjectURL(url);
                    showToast('书源已导出');
                }
            } catch (err) {
                showToast('导出失败: ' + err.message, true);
            }
        }
        
        async function clearSources() {
            if (!confirm('确定要清空所有书源吗？')) return;
            await fetch(`${API}/api/sources`, { method: 'DELETE' });
            loadSources();
            showToast('书源已清空');
        }
        
        async function loadDefaultSources() {
            const defaultSources = [
                {
                    bookSourceName: "笔趣阁",
                    bookSourceUrl: "https://www.biquge.com",
                    bookSourceType: 0,
                    searchUrl: "https://www.biquge.com/search.php?keyword={{key}}",
                    ruleSearch: {
                        bookList: ".result-list .result-item",
                        name: ".result-game-item-title a",
                        author: ".result-game-item-info-tag:eq(0) span:eq(1)",
                        bookUrl: ".result-game-item-title a@href"
                    }
                }
            ];
            
            const res = await fetch(`${API}/api/sources`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(defaultSources)
            });
            const data = await res.json();
            if (data.success) {
                showToast('默认书源已加载');
                loadSources();
            }
        }
        
        // 初始化
        renderHistory();
    </script>
</body>
</html>
