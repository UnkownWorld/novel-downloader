<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说下载器 - 基于 Legado</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>📚 小说下载器</h1>
            <p>基于 Legado 开源项目 | 支持多书源搜索下载</p>
        </header>
        
        <!-- 标签导航 -->
        <nav class="tabs">
            <button class="tab-btn active" data-tab="search">🔍 搜索</button>
            <button class="tab-btn" data-tab="sources">📖 书源管理</button>
            <button class="tab-btn" data-tab="subscribe">📡 书源订阅</button>
            <button class="tab-btn" data-tab="discover">🌐 发现</button>
            <button class="tab-btn" data-tab="settings">⚙️ 设置</button>
        </nav>
        
        <!-- 搜索标签 -->
        <div id="searchTab" class="tab-content active">
            <div class="card">
                <div class="form-row">
                    <input type="text" id="searchInput" placeholder="输入书名或作者搜索..." style="flex:1">
                    <button class="btn btn-primary" id="searchBtn">搜索</button>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <span class="card-title">搜索结果</span>
                    <span id="sourceCount">0 个书源</span>
                </div>
                <div id="searchResults" class="book-list">
                    <div class="empty">输入关键词开始搜索</div>
                </div>
            </div>
        </div>
        
        <!-- 书源管理标签 -->
        <div id="sourcesTab" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">导入书源</span>
                </div>
                <div class="form-row">
                    <input type="file" id="importInput" accept=".json,.txt" style="display:none">
                    <button class="btn btn-primary" onclick="document.getElementById('importInput').click()">
                        📁 本地导入
                    </button>
                    <button class="btn btn-secondary" onclick="app.importFromUrl()">
                        🔗 URL导入
                    </button>
                    <button class="btn btn-secondary" onclick="app.exportSources()">
                        📤 导出书源
                    </button>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <span class="card-title">书源列表</span>
                    <button class="btn btn-small btn-secondary" onclick="app.testSources()">
                        🧪 测试书源
                    </button>
                </div>
                <div id="testStatus" class="hidden"></div>
                <div id="sourceList" class="source-list">
                    <div class="empty">暂无书源，请导入书源</div>
                </div>
            </div>
        </div>
        
        <!-- 书源订阅标签 -->
        <div id="subscribeTab" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">添加订阅</span>
                </div>
                <div class="form-row">
                    <button class="btn btn-primary" onclick="app.addSubscription()">
                        ➕ 添加订阅
                    </button>
                    <button class="btn btn-secondary" onclick="app.updateAllSubscriptions()">
                        🔄 更新全部
                    </button>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <span class="card-title">订阅列表</span>
                </div>
                <div id="subscribeList" class="subscribe-list">
                    <div class="empty">暂无订阅</div>
                </div>
            </div>
        </div>
        
        <!-- 发现标签 -->
        <div id="discoverTab" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">发现</span>
                </div>
                <div id="discoverContent">
                    <div class="empty">选择书源查看发现内容</div>
                </div>
            </div>
        </div>
        
        <!-- 设置标签 -->
        <div id="settingsTab" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">搜索设置</span>
                </div>
                <div class="form-group">
                    <label>并发数量</label>
                    <input type="number" id="searchConcurrent" value="10" min="1" max="50">
                </div>
                <div class="form-group">
                    <label>超时时间(秒)</label>
                    <input type="number" id="searchTimeout" value="30" min="5" max="120">
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <span class="card-title">下载设置</span>
                </div>
                <div class="form-group">
                    <label>下载并发</label>
                    <input type="number" id="downloadConcurrent" value="5" min="1" max="20">
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <span class="card-title">数据管理</span>
                </div>
                <div class="form-row">
                    <button class="btn btn-danger" onclick="app.clearAllData()">
                        🗑️ 清除所有数据
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 书籍详情模态框 -->
    <div id="bookModal" class="modal">
        <div id="bookModalContent" class="modal-content">
            <div class="loading">加载中...</div>
        </div>
    </div>
    
    <!-- 点击模态框背景关闭 -->
    <script>
        document.getElementById('bookModal').addEventListener('click', function(e) {
            if (e.target === this) {
                app.closeModal();
            }
        });
    </script>
    
    <!-- 引入JS模块 -->
    <script src="js/analyze-rule.js"></script>
    <script src="js/analyze-url.js"></script>
    <script src="js/webbook.js"></script>
    <script src="js/booksource-manager.js"></script>
    <script src="js/subscribe-manager.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
