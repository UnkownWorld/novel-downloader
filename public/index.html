<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说下载器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { 
            font-size: 1.8rem; 
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { font-size: 0.85rem; opacity: 0.7; margin-top: 5px; }
        
        .card { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; 
            padding: 20px; 
            margin-bottom: 15px;
        }
        
        .search-form { display: flex; gap: 10px; flex-wrap: wrap; }
        .search-input { 
            flex: 1; 
            min-width: 200px;
            padding: 12px 15px; 
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 8px; 
            font-size: 1rem; 
        }
        .search-input::placeholder { color: rgba(255,255,255,0.5); }
        .search-input:focus { outline: none; border-color: #e94560; }
        
        .btn { 
            padding: 12px 20px; 
            background: linear-gradient(90deg, #e94560, #ff6b6b); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 0.95rem; 
            cursor: pointer; 
            transition: all 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-success { background: linear-gradient(90deg, #00b894, #00cec9); }
        .btn-secondary { background: rgba(255,255,255,0.15); }
        .btn-danger { background: linear-gradient(90deg, #d63031, #e17055); }
        
        .book-item { 
            padding: 15px; 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; 
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .book-item:hover { border-color: #e94560; background: rgba(233, 69, 96, 0.1); }
        .book-item.selected { border-color: #e94560; background: rgba(233, 69, 96, 0.2); }
        .book-item h3 { font-size: 1rem; margin-bottom: 5px; }
        .book-item .meta { color: rgba(255,255,255,0.6); font-size: 0.85rem; }
        
        .progress { margin-top: 15px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #e94560, #ff6b6b); transition: width 0.3s; }
        .progress-text { text-align: center; color: rgba(255,255,255,0.8); font-size: 0.9rem; }
        
        .hidden { display: none !important; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            background: rgba(0, 184, 148, 0.9);
            color: white;
            border-radius: 8px;
            transform: translateX(200%);
            transition: transform 0.3s;
            z-index: 1000;
            max-width: 300px;
        }
        .toast.show { transform: translateX(0); }
        .toast.error { background: rgba(214, 48, 49, 0.9); }
        
        .download-actions { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        
        .history-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px; 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .history-info h4 { font-size: 0.95rem; }
        .history-info p { font-size: 0.8rem; color: rgba(255,255,255,0.5); }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .tab { 
            padding: 8px 16px; 
            background: rgba(255,255,255,0.1); 
            color: white; 
            border: none;
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 0.85rem;
        }
        .tab.active { background: linear-gradient(90deg, #e94560, #ff6b6b); }
        
        .source-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            margin-bottom: 6px;
            background: rgba(255,255,255,0.02);
        }
        .source-item .name { font-weight: 500; }
        .source-item .url { font-size: 0.75rem; color: rgba(255,255,255,0.4); }
        
        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            resize: vertical;
        }
        textarea::placeholder { color: rgba(255,255,255,0.3); }
        
        .file-input-wrapper {
            position: relative;
            display: inline-block;
        }
        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }
        
        .stats {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        .stat {
            text-align: center;
            padding: 10px 15px;
            background: rgba(233, 69, 96, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(233, 69, 96, 0.2);
        }
        .stat .num { font-size: 1.5rem; font-weight: bold; color: #e94560; }
        .stat .label { font-size: 0.75rem; color: rgba(255,255,255,0.6); }
        
        .source-list {
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 15px;
        }
        
        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .btn-small {
            padding: 6px 12px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 小说下载器</h1>
            <p>支持自定义书源，搜索下载小说</p>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('search')">🔍 搜索下载</button>
            <button class="tab" onclick="showTab('sources')">📚 书源管理</button>
            <button class="tab" onclick="showTab('history')">📁 下载历史</button>
        </div>
        
        <!-- 搜索页面 -->
        <div id="searchTab">
            <div class="card">
                <form class="search-form" id="searchForm">
                    <input type="text" class="search-input" id="searchInput" placeholder="输入小说名称..." required>
                    <button type="submit" class="btn" id="searchBtn">搜索</button>
                </form>
            </div>
            
            <div class="card hidden" id="resultsCard">
                <h3 style="margin-bottom:12px">搜索结果 <span id="resultCount" style="opacity:0.6"></span></h3>
                <div id="bookList"></div>
            </div>
            
            <div class="card hidden" id="downloadCard">
                <div id="downloadInfo"></div>
                <div class="progress hidden" id="progressSection">
                    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
                    <div class="progress-text" id="progressText">准备中...</div>
                </div>
                <div class="download-actions hidden" id="saveActions">
                    <button class="btn btn-success" onclick="saveToFile()">💾 保存到本地</button>
                    <button class="btn" onclick="copyToClipboard()">📋 复制</button>
                </div>
            </div>
        </div>
        
        <!-- 书源管理页面 -->
        <div id="sourcesTab" class="hidden">
            <div class="card">
                <div class="stats">
                    <div class="stat">
                        <div class="num" id="sourceCount">0</div>
                        <div class="label">书源数量</div>
                    </div>
                </div>
                
                <h3 style="margin-bottom:10px">导入书源</h3>
                <p style="font-size:0.8rem;color:rgba(255,255,255,0.5);margin-bottom:10px">
                    支持Legado格式JSON，可以是单个书源或书源数组
                </p>
                
                <textarea id="sourceInput" placeholder='粘贴JSON书源，例如：
[
  {
    "bookSourceName": "笔趣阁",
    "bookSourceUrl": "https://www.biquge.com",
    "searchUrl": "https://www.biquge.com/search.php?keyword={{key}}"
  }
]'></textarea>
                
                <div class="btn-group" style="margin-top:10px">
                    <button class="btn" onclick="importSources()">📥 导入JSON</button>
                    <div class="file-input-wrapper">
                        <button class="btn btn-secondary">📁 选择文件</button>
                        <input type="file" accept=".json,.txt" onchange="importFromFile(event)">
                    </div>
                </div>
                
                <h3 style="margin:15px 0 10px">当前书源</h3>
                <div class="source-list" id="sourceList">
                    <p style="text-align:center;color:rgba(255,255,255,0.4);padding:20px">加载中...</p>
                </div>
                
                <div class="btn-group">
                    <button class="btn btn-success btn-small" onclick="loadDefaultSources()">📦 加载默认书源</button>
                    <button class="btn btn-secondary btn-small" onclick="exportSources()">📤 导出书源</button>
                    <button class="btn btn-danger btn-small" onclick="clearSources()">🗑️ 清空</button>
                </div>
            </div>
        </div>
        
        <!-- 历史页面 -->
        <div id="historyTab" class="hidden">
            <div class="card">
                <h3 style="margin-bottom:12px">下载历史</h3>
                <div id="historyList"></div>
                <button class="btn btn-secondary" onclick="clearHistory()" style="margin-top:12px">清空历史</button>
            </div>
        </div>
        
        <div style="text-align:center;color:rgba(255,255,255,0.4);margin-top:15px;font-size:0.8rem">
            书源来源于网络，仅供学习交流
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        // 默认书源
        const DEFAULT_SOURCES = [
            {
                bookSourceName: "贼吧网",
                bookSourceUrl: "https://m.zei8.vip",
                searchUrl: "https://m.zei8.vip/search.php?keyword={{key}}",
                enabled: true
            }
        ];
        
        let bookSources = [];
        let searchResults = [];
        let selectedBook = null;
        let downloadedContent = '';
        let downloadHistory = JSON.parse(localStorage.getItem('novelHistory') || '[]');
        
        // 初始化书源
        function initSources() {
            const saved = localStorage.getItem('bookSources');
            if (saved) {
                bookSources = JSON.parse(saved);
            } else {
                bookSources = [...DEFAULT_SOURCES];
                saveSources();
            }
            updateSourceCount();
        }
        
        function saveSources() {
            localStorage.setItem('bookSources', JSON.stringify(bookSources));
            updateSourceCount();
        }
        
        function updateSourceCount() {
            document.getElementById('sourceCount').textContent = bookSources.length;
        }
        
        // Toast
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // Tab切换
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('searchTab').classList.toggle('hidden', tab !== 'search');
            document.getElementById('sourcesTab').classList.toggle('hidden', tab !== 'sources');
            document.getElementById('historyTab').classList.toggle('hidden', tab !== 'history');
            if (tab === 'sources') renderSourceList();
            if (tab === 'history') renderHistory();
        }
        
        // ========== 书源管理 ==========
        
        function renderSourceList() {
            const list = document.getElementById('sourceList');
            if (!bookSources.length) {
                list.innerHTML = '<p style="text-align:center;color:rgba(255,255,255,0.4);padding:20px">暂无书源，请导入</p>';
                return;
            }
            list.innerHTML = bookSources.map((s, i) => `
                <div class="source-item">
                    <div>
                        <div class="name">${s.bookSourceName}</div>
                        <div class="url">${s.bookSourceUrl}</div>
                    </div>
                    <button class="btn btn-danger btn-small" onclick="deleteSource(${i})">删除</button>
                </div>
            `).join('');
        }
        
        function importSources() {
            const input = document.getElementById('sourceInput').value.trim();
            if (!input) {
                showToast('请输入JSON内容', true);
                return;
            }
            
            try {
                const data = JSON.parse(input);
                const sources = Array.isArray(data) ? data : [data];
                let added = 0;
                
                sources.forEach(s => {
                    if (s.bookSourceName && s.bookSourceUrl) {
                        // 检查是否已存在
                        if (!bookSources.some(existing => existing.bookSourceUrl === s.bookSourceUrl)) {
                            bookSources.push({
                                bookSourceName: s.bookSourceName,
                                bookSourceUrl: s.bookSourceUrl,
                                searchUrl: s.searchUrl || '',
                                enabled: true
                            });
                            added++;
                        }
                    }
                });
                
                saveSources();
                renderSourceList();
                document.getElementById('sourceInput').value = '';
                showToast(`成功导入 ${added} 个书源`);
            } catch (e) {
                showToast('JSON格式错误: ' + e.message, true);
            }
        }
        
        function importFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('sourceInput').value = e.target.result;
                importSources();
            };
            reader.readAsText(file);
        }
        
        function deleteSource(index) {
            bookSources.splice(index, 1);
            saveSources();
            renderSourceList();
            showToast('已删除');
        }
        
        function loadDefaultSources() {
            let added = 0;
            DEFAULT_SOURCES.forEach(s => {
                if (!bookSources.some(existing => existing.bookSourceUrl === s.bookSourceUrl)) {
                    bookSources.push({...s});
                    added++;
                }
            });
            saveSources();
            renderSourceList();
            showToast(`已加载 ${added} 个默认书源`);
        }
        
        function exportSources() {
            if (!bookSources.length) {
                showToast('没有书源可导出', true);
                return;
            }
            const json = JSON.stringify(bookSources, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'book_sources.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('已导出');
        }
        
        function clearSources() {
            if (!confirm('确定要清空所有书源吗？')) return;
            bookSources = [];
            saveSources();
            renderSourceList();
            showToast('已清空');
        }
        
        // ========== 搜索下载 ==========
        
        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) return;
            
            if (!bookSources.length) {
                showToast('请先添加书源', true);
                return;
            }
            
            const btn = document.getElementById('searchBtn');
            btn.disabled = true;
            btn.textContent = '搜索中...';
            
            searchResults = [];
            
            // 搜索所有书源
            for (const source of bookSources) {
                if (!source.searchUrl) continue;
                
                try {
                    const searchUrl = source.searchUrl.replace('{{key}}', encodeURIComponent(keyword));
                    const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(searchUrl)}`);
                    const data = await response.json();
                    const html = data.contents;
                    
                    // 解析搜索结果
                    const linkPattern = /<a[^>]*href="([^"]*)"[^>]*>([^<]{2,50})<\/a>/g;
                    let match;
                    
                    while ((match = linkPattern.exec(html)) !== null) {
                        const url = match[1];
                        const name = match[2].trim();
                        
                        if (name && !searchResults.some(r => r.name === name && r.source === source.bookSourceName)) {
                            // 过滤非书籍链接
                            if (url.includes('txt') || url.includes('book') || url.includes('novel') || url.includes('/\d+')) {
                                const fullUrl = url.startsWith('http') ? url : source.bookSourceUrl + url;
                                searchResults.push({
                                    name: name,
                                    author: '',
                                    source: source.bookSourceName,
                                    url: fullUrl
                                });
                            }
                        }
                    }
                } catch (err) {
                    console.error(`搜索 ${source.bookSourceName} 失败:`, err);
                }
            }
            
            if (searchResults.length > 0) {
                displayResults(searchResults.slice(0, 20));
                showToast(`找到 ${searchResults.length} 个结果`);
            } else {
                showToast('未找到结果', true);
            }
            
            btn.disabled = false;
            btn.textContent = '搜索';
        });
        
        function displayResults(results) {
            const list = document.getElementById('bookList');
            document.getElementById('resultCount').textContent = `(${results.length})`;
            
            list.innerHTML = results.map((book, i) => `
                <div class="book-item" onclick="selectBook(${i})">
                    <h3>《${book.name}》</h3>
                    <div class="meta">来源: ${book.source}</div>
                </div>
            `).join('');
            
            document.getElementById('resultsCard').classList.remove('hidden');
            document.getElementById('downloadCard').classList.add('hidden');
        }
        
        function selectBook(index) {
            document.querySelectorAll('.book-item').forEach((item, i) => {
                item.classList.toggle('selected', i === index);
            });
            selectedBook = searchResults[index];
            
            document.getElementById('downloadInfo').innerHTML = `
                <h3>《${selectedBook.name}》</h3>
                <p style="color:rgba(255,255,255,0.6);margin-top:5px">来源: ${selectedBook.source}</p>
                <button class="btn" id="downloadBtn" style="margin-top:15px" onclick="startDownload()">📥 开始下载</button>
            `;
            document.getElementById('downloadCard').classList.remove('hidden');
            document.getElementById('progressSection').classList.add('hidden');
            document.getElementById('saveActions').classList.add('hidden');
        }
        
        // 下载
        async function startDownload() {
            if (!selectedBook) return;
            
            document.getElementById('progressSection').classList.remove('hidden');
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressText').textContent = '正在获取书籍信息...';
            downloadedContent = '';
            
            try {
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(selectedBook.url)}`);
                const data = await response.json();
                const html = data.contents;
                
                // 查找下载链接
                const zipPattern = /href="(https?:\/\/[^"]+\.zip)"/i;
                const txtPattern = /href="(https?:\/\/[^"]+\.txt)"/i;
                
                let downloadUrl = html.match(zipPattern)?.[1] || html.match(txtPattern)?.[1];
                
                if (downloadUrl) {
                    document.getElementById('progressText').textContent = '找到下载链接，正在下载...';
                    document.getElementById('progressFill').style.width = '30%';
                    
                    const fileResponse = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(downloadUrl)}`);
                    const blob = await fileResponse.blob();
                    
                    document.getElementById('progressFill').style.width = '60%';
                    
                    if (downloadUrl.endsWith('.zip')) {
                        document.getElementById('progressText').textContent = '正在解压...';
                        
                        // 加载JSZip
                        if (typeof JSZip === 'undefined') {
                            const script = document.createElement('script');
                            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
                            document.head.appendChild(script);
                            await new Promise(resolve => script.onload = resolve);
                        }
                        
                        const zip = await JSZip.loadAsync(blob);
                        const files = Object.keys(zip.files);
                        const txtFile = files.find(f => f.endsWith('.txt'));
                        
                        if (txtFile) {
                            let content = await zip.file(txtFile).async('uint8array');
                            const decoder = new TextDecoder('gbk');
                            downloadedContent = decoder.decode(content);
                        } else {
                            throw new Error('ZIP中没有TXT文件');
                        }
                    } else {
                        downloadedContent = await blob.text();
                    }
                    
                    document.getElementById('progressFill').style.width = '100%';
                    document.getElementById('progressText').textContent = '下载完成！';
                    document.getElementById('saveActions').classList.remove('hidden');
                    
                    saveToHistory();
                    showToast('下载完成！');
                } else {
                    // 尝试解析章节
                    document.getElementById('progressText').textContent = '正在解析章节...';
                    await downloadByChapters(html);
                }
            } catch (err) {
                document.getElementById('progressText').textContent = '错误: ' + err.message;
                showToast('下载失败: ' + err.message, true);
            }
        }
        
        async function downloadByChapters(html) {
            // 解析章节列表
            const chapterPattern = /<a[^>]*href="([^"]+)"[^>]*>(第[^<]+)<\/a>/g;
            const chapters = [];
            let match;
            
            while ((match = chapterPattern.exec(html)) !== null) {
                chapters.push({
                    url: match[1].startsWith('http') ? match[1] : selectedBook.url.match(/https?:\/\/[^\/]+/)[0] + match[1],
                    title: match[2]
                });
            }
            
            if (!chapters.length) {
                throw new Error('未找到章节');
            }
            
            downloadedContent = `书名: ${selectedBook.name}\n来源: ${selectedBook.source}\n\n`;
            
            const total = Math.min(chapters.length, 100); // 最多100章
            
            for (let i = 0; i < total; i++) {
                try {
                    const resp = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(chapters[i].url)}`);
                    const data = await resp.json();
                    const contentMatch = data.contents.match(/<div[^>]*id="content"[^>]*>([\s\S]*?)<\/div>/i);
                    
                    if (contentMatch) {
                        let content = contentMatch[1].replace(/<[^>]+>/g, '').replace(/&nbsp;/g, ' ').trim();
                        downloadedContent += `\n${chapters[i].title}\n\n${content}\n\n`;
                    }
                    
                    document.getElementById('progressFill').style.width = `${Math.round((i + 1) / total * 100)}%`;
                    document.getElementById('progressText').textContent = `下载中: ${i + 1}/${total}`;
                } catch (e) {}
            }
            
            document.getElementById('saveActions').classList.remove('hidden');
            saveToHistory();
            showToast('下载完成！');
        }
        
        // 保存到本地
        function saveToFile() {
            if (!downloadedContent) return showToast('没有内容', true);
            
            const blob = new Blob([downloadedContent], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${selectedBook.name}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('文件已保存！');
        }
        
        // 复制
        async function copyToClipboard() {
            if (!downloadedContent) return showToast('没有内容', true);
            try {
                await navigator.clipboard.writeText(downloadedContent.substring(0, 100000));
                showToast('已复制！');
            } catch (e) {
                showToast('复制失败', true);
            }
        }
        
        // ========== 历史 ==========
        
        function saveToHistory() {
            const item = {
                id: Date.now(),
                name: selectedBook.name,
                source: selectedBook.source,
                content: downloadedContent.substring(0, 500000),
                date: new Date().toLocaleString(),
                size: (downloadedContent.length / 1024).toFixed(1) + ' KB'
            };
            downloadHistory.unshift(item);
            if (downloadHistory.length > 10) downloadHistory = downloadHistory.slice(0, 10);
            localStorage.setItem('novelHistory', JSON.stringify(downloadHistory));
        }
        
        function renderHistory() {
            const list = document.getElementById('historyList');
            if (!downloadHistory.length) {
                list.innerHTML = '<p style="text-align:center;color:rgba(255,255,255,0.4);padding:20px">暂无记录</p>';
                return;
            }
            list.innerHTML = downloadHistory.map(item => `
                <div class="history-item">
                    <div class="history-info">
                        <h4>《${item.name}》</h4>
                        <p>${item.size} | ${item.date}</p>
                    </div>
                    <button class="btn btn-small" onclick="downloadHistoryItem(${item.id})">保存</button>
                </div>
            `).join('');
        }
        
        function downloadHistoryItem(id) {
            const item = downloadHistory.find(h => h.id === id);
            if (item) {
                const blob = new Blob([item.content], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${item.name}.txt`;
                a.click();
                URL.revokeObjectURL(url);
            }
        }
        
        function clearHistory() {
            downloadHistory = [];
            localStorage.setItem('novelHistory', '[]');
            renderHistory();
            showToast('已清空');
        }
        
        // 初始化
        initSources();
        renderHistory();
    </script>
</body>
</html>
