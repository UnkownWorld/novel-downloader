name: Update Book Sources

on:
  schedule:
    # 每天 UTC 0:00 运行 (北京时间 8:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 手动触发

jobs:
  update-sources:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Download and test book sources
        run: |
          echo "📥 下载书源..."
          
          # 下载书源JSON文件
          curl -sL "https://www.yckceo.com/yuedu/shuyuans/json/id/1063.json" -o sources_raw.json
          
          # 检查是否下载成功
          if [ ! -s sources_raw.json ]; then
            echo "❌ 下载失败"
            exit 1
          fi
          
          echo "✅ 下载成功，文件大小: $(wc -c < sources_raw.json) 字节"
          
          # 创建测试脚本
          cat > test_sources.js << 'SCRIPT'
          const fs = require('fs');
          const https = require('https');
          const http = require('http');
          const { URL } = require('url');
          
          // 从各种格式中提取书源数组
          function extractBookSources(data) {
            if (Array.isArray(data)) return data;
            if (data && data.bookSourceName && data.bookSourceUrl) return [data];
            
            // 处理嵌套格式
            if (data && data.content && Array.isArray(data.content)) {
              const sources = [];
              for (const item of data.content) {
                if (item && item.text) {
                  try {
                    const parsed = JSON.parse(item.text);
                    if (Array.isArray(parsed)) sources.push(...parsed);
                    else if (parsed && typeof parsed === 'object') sources.push(parsed);
                  } catch (e) {}
                }
              }
              if (sources.length > 0) return sources;
            }
            
            // 其他格式
            if (data && typeof data.content === 'string') {
              try {
                const parsed = JSON.parse(data.content);
                if (Array.isArray(parsed)) return parsed;
              } catch (e) {}
            }
            if (data && data.data && Array.isArray(data.data)) return data.data;
            if (data && data.sources && Array.isArray(data.sources)) return data.sources;
            
            return [];
          }
          
          // 测试URL是否可访问（支持重定向）
          function testUrl(urlString, timeout = 15000, maxRedirects = 5) {
            return new Promise((resolve) => {
              if (!urlString) {
                resolve({ success: false, error: 'URL为空' });
                return;
              }
              
              let redirectCount = 0;
              
              const makeRequest = (currentUrl) => {
                if (redirectCount >= maxRedirects) {
                  resolve({ success: false, error: '重定向次数过多' });
                  return;
                }
                
                let parsedUrl;
                try {
                  parsedUrl = new URL(currentUrl);
                } catch (e) {
                  resolve({ success: false, error: 'URL格式错误' });
                  return;
                }
                
                const protocol = parsedUrl.protocol === 'https:' ? https : http;
                const timer = setTimeout(() => {
                  resolve({ success: false, error: '超时' });
                }, timeout);
                
                try {
                  const req = protocol.get(currentUrl, {
                    headers: {
                      'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
                    }
                  }, (res) => {
                    clearTimeout(timer);
                    
                    // 处理重定向
                    if (res.statusCode >= 300 && res.statusCode < 400 && res.headers.location) {
                      redirectCount++;
                      // 处理相对路径重定向
                      let location = res.headers.location;
                      if (location.startsWith('/')) {
                        location = `${parsedUrl.protocol}//${parsedUrl.host}${location}`;
                      } else if (!location.startsWith('http')) {
                        location = `${parsedUrl.protocol}//${parsedUrl.host}/${location}`;
                      }
                      makeRequest(location);
                      return;
                    }
                    
                    // 成功响应
                    if (res.statusCode >= 200 && res.statusCode < 300) {
                      resolve({ success: true });
                    } else {
                      resolve({ success: false, error: `状态码: ${res.statusCode}` });
                    }
                  });
                  
                  req.on('error', (e) => {
                    clearTimeout(timer);
                    resolve({ success: false, error: e.message });
                  });
                } catch (e) {
                  clearTimeout(timer);
                  resolve({ success: false, error: e.message });
                }
              };
              
              makeRequest(urlString);
            });
          }
          
          // 测试书源（简化版：只测试首页）
          async function testSource(source) {
            const result = {
              source,
              valid: false,
              error: ''
            };
            
            if (!source.bookSourceUrl) {
              result.error = '书源URL为空';
              return result;
            }
            
            // 只测试首页是否可访问
            const homeResult = await testUrl(source.bookSourceUrl, 15000);
            if (!homeResult.success) {
              result.error = `首页无法访问: ${homeResult.error}`;
              return result;
            }
            
            result.valid = true;
            return result;
          }
          
          async function main() {
            let rawData;
            try {
              rawData = JSON.parse(fs.readFileSync('sources_raw.json', 'utf8'));
            } catch (e) {
              console.error('解析JSON失败:', e.message);
              process.exit(1);
            }
            
            const sources = extractBookSources(rawData);
            
            console.log(`📊 总书源数: ${sources.length}`);
            
            const validSources = [];
            const invalidSources = [];
            
            // 并发测试，每次10个
            const batchSize = 10;
            for (let i = 0; i < sources.length; i += batchSize) {
              const batch = sources.slice(i, i + batchSize);
              const results = await Promise.all(batch.map(testSource));
              
              for (const r of results) {
                if (r.valid) {
                  validSources.push(r.source);
                } else {
                  invalidSources.push({
                    name: r.source.bookSourceName,
                    url: r.source.bookSourceUrl,
                    error: r.error
                  });
                }
              }
              
              const progress = Math.min(i + batchSize, sources.length);
              console.log(`⏳ 进度: ${progress}/${sources.length} | 有效: ${validSources.length} | 失效: ${invalidSources.length}`);
            }
            
            console.log(`\n========================================`);
            console.log(`✅ 有效书源: ${validSources.length}`);
            console.log(`❌ 失效书源: ${invalidSources.length}`);
            console.log(`========================================\n`);
            
            // 输出失效书源列表（前30个）
            if (invalidSources.length > 0) {
              console.log('失效书源列表:');
              invalidSources.slice(0, 30).forEach((s, i) => {
                console.log(`  ${i+1}. ${s.name}`);
                console.log(`     URL: ${s.url}`);
                console.log(`     原因: ${s.error}`);
              });
              if (invalidSources.length > 30) {
                console.log(`  ... 还有 ${invalidSources.length - 30} 个失效书源`);
              }
            }
            
            // 保存有效书源
            fs.writeFileSync('public/sources.json', JSON.stringify(validSources, null, 2));
            console.log(`\n💾 已保存 ${validSources.length} 个有效书源到 public/sources.json`);
            
            // 保存测试报告
            const report = {
              updateTime: new Date().toISOString(),
              total: sources.length,
              valid: validSources.length,
              invalid: invalidSources.length,
              invalidList: invalidSources
            };
            fs.writeFileSync('test_report.json', JSON.stringify(report, null, 2));
          }
          
          main().catch(console.error);
          SCRIPT
          
          # 运行测试
          echo ""
          echo "🧪 开始测试书源有效性..."
          node test_sources.js
      
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "自动更新书源 $(date '+%Y-%m-%d') - 已过滤失效书源"
      
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
