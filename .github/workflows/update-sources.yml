name: Update Book Sources

on:
  schedule:
    # 每天 UTC 0:00 运行 (北京时间 8:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 手动触发

jobs:
  update-sources:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download book sources
        run: |
          echo "下载书源..."
          
          # 下载书源JSON文件
          curl -sL "https://www.yckceo.com/yuedu/shuyuans/json/id/1063.json" -o sources_new.json
          
          # 检查是否下载成功
          if [ -s sources_new.json ]; then
            echo "下载成功，文件大小: $(wc -c < sources_new.json) 字节"
            
            # 统计书源数量
            SOURCES_COUNT=$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('sources_new.json')); console.log(data.length);")
            echo "书源数量: $SOURCES_COUNT"
            
            # 替换原文件
            mv sources_new.json public/sources.json
          else
            echo "下载失败，保留原文件"
          fi
      
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "自动更新书源 $(date '+%Y-%m-%d')"
      
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
